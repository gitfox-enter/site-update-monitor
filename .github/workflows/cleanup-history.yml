name: Git History Cleanup

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type CLEANUP to confirm'
        required: true

jobs:
  cleanup:
    if: github.event.inputs.confirm == 'CLEANUP'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install git-filter-repo
        run: pip install git-filter-repo

      - name: Remove large/binary files from history
        run: |
          # Remove monitor.db (1.3MB, was committed many times)
          git filter-repo --path monitor.db --invert-paths --force
          
          # Remove email_backup directory
          git filter-repo --path email_backup/ --invert-paths --force


      - name: Force push cleaned history
        env:
          GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 使用直接 push URL，避免在 remote 中暴露 token
          REPO_URL="https://x-access-token:${GIT_TOKEN}@github.com/${{ github.repository }}.git"
          git push "$REPO_URL" --force --all
          git push "$REPO_URL" --force --tags
