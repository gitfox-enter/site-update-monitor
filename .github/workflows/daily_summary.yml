name: 每日摘要

on:
  schedule:
    # 每天北京时间 22:00 (UTC 14:00) 生成摘要
    - cron: '0 14 * * *'
  workflow_dispatch:

concurrency:
  group: daily-summary
  cancel-in-progress: true

jobs:
  summary:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TZ: Asia/Shanghai
    permissions:
      contents: write
      issues: write
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 生成每日摘要
        run: python alerter.py

      - name: 提交变更
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: 每日摘要自动提交 $(date +%Y-%m-%d)"
          git push
