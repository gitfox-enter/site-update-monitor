name: 快速增量检查

on:
  schedule:
    # 每 30 分钟唤醒，由 smart_scheduler 决定是否执行
    - cron: '15,45 * * * *'
  workflow_dispatch:

concurrency:
  group: fast-check
  cancel-in-progress: true

jobs:
  fast-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TZ: Asia/Shanghai
    permissions:
      contents: write
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 配置 Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: 运行快速检查
        run: python fast_check.py

      - name: 生成 RSS Feed
        run: python rss_feed.py

      - name: 生成 OPML
        run: python opml_generator.py

      - name: 提交变更
        run: |
          set +e

          # 总是添加 crawl_status.json，确保网页显示最后爬取时间
          git add crawl_status.json 2>/dev/null || true
          # 调度器状态和日志（智能调度需要）
          git add scheduler_state.json fast_log.jsonl 2>/dev/null || true
          # 数据和状态文件
          git add hash_record.txt notified_items.json adaptive_tiers.json 2>/dev/null || true
          # Per-site feeds, OPML, and meta
          git add feeds/ opml.xml feeds_meta.json 2>/dev/null || true

          git status
          if git diff --staged --quiet 2>/dev/null; then
            echo "No changes to commit"
            exit 0
          fi

          # 检查是否有新内容
          if git diff --staged --name-only | grep -q "adaptive_tiers.json"; then
            COMMIT_MSG="快速更新: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          else
            COMMIT_MSG="状态更新: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          fi

          git commit -m "$COMMIT_MSG"
          push_success=false
          for i in 1 2 3 4 5; do
            echo "=== Push attempt $i ==="
            git rebase --abort 2>/dev/null || true
            git pull --rebase --strategy-option=ours origin main
            rebase_rc=$?
            if [ $rebase_rc -ne 0 ]; then
              git diff --name-only --diff-filter=U | while read conflict_file; do
                git checkout --theirs "$conflict_file"
                git add "$conflict_file"
              done
              git -c core.editor=true rebase --continue || true
            fi
            if git push origin main; then
              push_success=true
              break
            fi
            sleep 2
          done
          if [ "$push_success" != "true" ]; then
            echo "All push attempts failed"
            exit 1
          fi
