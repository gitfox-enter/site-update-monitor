name: 快速增量检查

on:
  schedule:
    # 每 2 小时偏移 30 分钟作为兜底（Cloudflare Worker 负责精准触发）
    - cron: '30 */2 * * *'
  workflow_dispatch:

concurrency:
  group: fast-check
  cancel-in-progress: true

jobs:
  fast-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TZ: Asia/Shanghai
    permissions:
      contents: write
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 配置 Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: 运行快速检查
        run: python fast_check.py

      - name: 提交变更
        run: |
          set +e
          git add items.json items_latest.json crawl_status.json hash_record.txt notified_items.json failed_sites.json adaptive_tiers.json monitor.db 2>/dev/null || true
          git status
          if git diff --staged --quiet 2>/dev/null; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "fast-check: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          push_success=false
          for i in 1 2 3 4 5; do
            echo "=== Push attempt $i ==="
            git rebase --abort 2>/dev/null || true
            git pull --rebase --strategy-option=theirs origin main
            rebase_rc=$?
            if [ $rebase_rc -ne 0 ]; then
              git diff --name-only --diff-filter=U | while read conflict_file; do
                git checkout --theirs "$conflict_file"
                git add "$conflict_file"
              done
              git -c core.editor=true rebase --continue || true
            fi
            if git push origin main; then
              push_success=true
              break
            fi
            sleep 2
          done
          if [ "$push_success" != "true" ]; then
            echo "All push attempts failed"
            exit 1
          fi
