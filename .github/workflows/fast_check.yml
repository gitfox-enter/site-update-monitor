name: 快速增量检查

on:
  schedule:
    # 每 30 分钟唤醒，由 smart_scheduler 决定是否执行
    - cron: '15,45 * * * *'
  workflow_dispatch:

concurrency:
  group: fast-check
  cancel-in-progress: true

jobs:
  fast-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TZ: Asia/Shanghai
    permissions:
      contents: write
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 配置 Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: 运行快速检查
        run: python fast_check.py

      - name: 生成 RSS Feed
        run: python rss_feed.py

      - name: 生成 OPML
        run: python opml_generator.py

      - name: 提交变更
        run: |
          set +e

          # 使用排他性文件名策略：仅 commit fast_check workflow 负责的文件
          # feeds_meta.json 由 fast_check 单独管理（避免与 crawl 并发冲突）
          git add -u feeds_meta.json 2>/dev/null || true
          # feeds/ 目录（fast_check 更新 feeds）
          git add -u feeds/ 2>/dev/null || true
          # 调度器状态和日志
          git add -u scheduler_state.json fast_log.jsonl 2>/dev/null || true
          # OPML 由 fast_check 更新
          git add -u opml.xml opml-*.xml 2>/dev/null || true

          git status
          if git diff --staged --quiet 2>/dev/null; then
            echo "No changes to commit"
            exit 0
          fi

          # 检查是否有新内容
          if git diff --staged --name-only | grep -q "feed.xml\|adaptive_tiers.json"; then
            COMMIT_MSG="快速更新: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          else
            COMMIT_MSG="状态更新: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          fi

          git commit -m "$COMMIT_MSG"
          push_success=false
          for i in 1 2 3 4 5; do
            echo "=== Push attempt $i ==="
            # Abort any existing rebase first
            git rebase --abort 2>/dev/null || true
            # Use --no-commit to avoid auto-committing merge; let conflicts be resolved manually
            # Fix #58: --strategy-option=theirs can discard incoming crawled data
            git pull --no-commit origin main
            rebase_rc=$?
            if [ $rebase_rc -ne 0 ]; then
              echo "Rebase had conflicts, attempting auto-resolution..."
              # Stage all resolved files (Git marks conflicts in index)
              git diff --name-only --diff-filter=U | while read conflict_file; do
                # Prefer local (our crawler) version for data files, else accept theirs
                case "$conflict_file" in
                  items.json|items_latest.json|run_log.jsonl|feeds/|feeds_meta.json)
                    echo "Data conflict: keeping our fast_check version of $conflict_file"
                    git checkout --ours "$conflict_file" 2>/dev/null || git checkout --theirs "$conflict_file"
                    ;;
                  *)
                    echo "Conflict in $conflict_file: accepting remote version"
                    git checkout --theirs "$conflict_file"
                    ;;
                esac
                git add "$conflict_file"
              done
              # Abort rebase and do a merge commit instead (preserves both sides)
              git rebase --abort 2>/dev/null || true
              git merge origin/main --no-edit
            fi
            if git push origin main; then
              push_success=true
              break
            fi
            echo "Push attempt $i failed, waiting before retry..."
            sleep 2
          done
          if [ "$push_success" = true ]; then
            echo "Changes committed and pushed successfully"
          else
            echo "All push attempts failed"
            exit 1
          fi
