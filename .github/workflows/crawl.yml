name: 站点更新监控

on:
  # 定时触发：每4小时执行一次（北京时间 00:00, 04:00, 08:00, 12:00, 16:00, 20:00）
  # Cron表达式（UTC时间）：0 */4 * * *
  # 对应北京时间：08:00, 12:00, 16:00, 20:00, 00:00, 04:00
  schedule:
    - cron: '0 */4 * * *'
  
  # 手动触发（用于测试）
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    # 设置时区为北京时间
    env:
      TZ: Asia/Shanghai
    
    # 给予写权限
    permissions:
      contents: write
    
    steps:
      # 1. 检出代码仓库
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # 获取完整历史，确保push正常
      
      # 2. 设置Python环境
      - name: 设置Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      # 3. 安装依赖
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # 4. 配置Git用户信息（用于提交变更）
      - name: 配置Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
      
      # 5. 执行监控脚本
      - name: 运行监控
        env:
          # 163邮箱SMTP配置（从GitHub Secrets读取）
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python crawl.py
      
      # 6. 提交变更（哈希记录、邮件备份、Dashboard数据）
      - name: 提交变更
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # 添加存在的文件和目录（使用 find 安全添加）
          git add hash_record.txt data/ index.html notified_items.json run_log.jsonl feed.xml paused_sites.json failed_sites.json 2>/dev/null || true
          # 安全添加 email_backup/ 目录（如果存在）
          if [ -d email_backup ]; then
            git add email_backup/ 2>/dev/null || true
          fi
          git status
          
          # 检查是否有变更
          if git diff --staged --quiet 2>/dev/null; then
            echo "No changes to commit"
          else
            git commit -m "自动更新: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
            git push origin main
            echo "✓ Changes committed and pushed successfully"
          fi
      
      # 7. 上传邮件备份（可选，用于手动下载查看）
      - name: 上传邮件备份
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: email-backup-${{ github.run_number }}
          path: email_backup/
          retention-days: 30
