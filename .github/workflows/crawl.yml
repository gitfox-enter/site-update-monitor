name: 站点更新监控

on:
  schedule:
    # 每 30 分钟唤醒，由 smart_scheduler 决定是否执行
    - cron: '0,30 * * * *'
  workflow_dispatch:

concurrency:
  group: site-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TZ: Asia/Shanghai
    permissions:
      contents: write
      packages: write
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: 设置Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: 安装 Playwright 浏览器
        run: playwright install --with-deps chromium
      - name: 配置Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
      - name: 运行监控
        run: python crawl.py
      - name: 生成 RSS Feed
        run: python rss_feed.py

      - name: 提交变更
        run: |
          set +e
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # 总是添加 crawl_status.json，确保网页显示最后爬取时间
          git add crawl_status.json 2>/dev/null || true
          # 调度器状态和日志（智能调度需要）
          git add scheduler_state.json run_log.jsonl 2>/dev/null || true
          # 数据和状态文件
          git add hash_record.txt notified_items.json adaptive_tiers.json feed.xml 2>/dev/null || true

          git status
          if git diff --staged --quiet 2>/dev/null; then
            echo "No changes to commit"
            exit 0
          fi

          # 检查是否有新内容
          if git diff --staged --name-only | grep -q "feed.xml"; then
            COMMIT_MSG="自动更新: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          elif git diff --staged --name-only | grep -q "adaptive_tiers.json"; then
            COMMIT_MSG="状态更新: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          fi

          git commit -m "$COMMIT_MSG"
          push_success=false
          for i in 1 2 3 4 5; do
            echo "=== Push attempt $i ==="
            # Abort any existing rebase first
            git rebase --abort 2>/dev/null || true
            git pull --rebase --strategy-option=theirs origin main
            rebase_rc=$?
            if [ $rebase_rc -ne 0 ]; then
              echo "Rebase had conflicts, resolving with our changes (--theirs in rebase context = our commit)..."
              git diff --name-only --diff-filter=U | while read conflict_file; do
                echo "Resolving conflict in $conflict_file using our version"
                # In rebase: --theirs = our commit (the one being rebased), --ours = upstream
                git checkout --theirs "$conflict_file"
                git add "$conflict_file"
              done
              git rebase --continue 2>/dev/null || {
                echo "Rebase continue failed, trying --skip..."
                git rebase --skip 2>/dev/null || true
              }
            fi
            if git push origin main; then
              push_success=true
              break
            fi
            echo "Push attempt $i failed, waiting before retry..."
            sleep 10
          done
          if [ "$push_success" = true ]; then
            echo "Changes committed and pushed successfully"
          else
            echo "Failed to push changes after 5 attempts"
            exit 1
          fi
      - name: 上传运行日志
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: run-log-${{ github.run_number }}
          path: run_log.jsonl
          retention-days: 30
