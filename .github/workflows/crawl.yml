name: RSSForge Crawl

on:
  schedule:
    # 每 30 分钟唤醒，由 smart_scheduler 决定是否执行
    - cron: '0,30 * * * *'
  workflow_dispatch:

concurrency:
  group: site-monitor
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TZ: Asia/Shanghai
    outputs:
      needs_deploy: ${{ steps.deploy-flag.outputs.NEEDS_DEPLOY }}
    permissions:
      contents: write
      packages: write
    steps:
      - name: 夜间跳过 (23:00-07:00 减少运行)
        id: night-check
        run: |
          HOUR=$(date +%H)
          if [ "$HOUR" -ge 23 ] || [ "$HOUR" -lt 7 ]; then
            echo "SKIP=true" >> $GITHUB_OUTPUT
            echo "夜间模式 ($HOUR:00)，跳过本次爬取以节省 Actions 额度"
          else
            echo "SKIP=false" >> $GITHUB_OUTPUT
          fi
      - name: 检出仓库
        if: steps.night-check.outputs.SKIP != 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: 设置Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: 安装 Playwright 浏览器
        run: playwright install --with-deps chromium
      - name: 配置Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
      - name: 运行监控
        run: python crawl.py
      - name: 生成 RSS Feed
        run: python rss_feed.py
      - name: 生成 OPML
        run: python opml_generator.py

      - name: 删除主 RSS 聚合文件
        run: |
          # 删除主 feed.xml（不再需要聚合所有站点的 RSS）
          if [ -f feed.xml ]; then
            rm -f feed.xml
            echo "已删除 feed.xml"
          fi
          # 删除旧的分类 OPML（如有）
          rm -f opml-*.xml

      - name: 提交变更
        run: |
          set +e
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # 总是添加 crawl_status.json，确保网页显示最后爬取时间
          git add crawl_status.json items.json items_latest.json 2>/dev/null || true
          # 调度器状态和日志（智能调度需要）
          git add scheduler_state.json run_log.jsonl 2>/dev/null || true
          # 数据和状态文件（不包含 feed.xml）
          git add hash_record.txt notified_items.json adaptive_tiers.json 2>/dev/null || true
          # Per-site feeds, 统一 OPML, 和 meta
          git add -A feeds/ opml.xml feeds_meta.json public/icons/ 2>/dev/null || true
          git add -u opml-*.xml 2>/dev/null || true

          git status
          if git diff --staged --quiet 2>/dev/null; then
            echo "No changes to commit"
            exit 0
          fi

          # 检查是否有新内容
          HAS_NEW_CONTENT=false
          if git diff --staged --name-only | grep -q "feeds/"; then
            HAS_NEW_CONTENT=true
            FEED_COUNT=$(git diff --staged --name-only | grep -c "feeds/" || echo "0")
            COMMIT_MSG="自动更新: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S') | 新增 ${FEED_COUNT} 个 feed"
          elif git diff --staged --name-only | grep -q "feeds_meta.json"; then
            HAS_NEW_CONTENT=true
            COMMIT_MSG="状态更新: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          elif git diff --staged --name-only | grep -q "opml.xml"; then
            HAS_NEW_CONTENT=true
            COMMIT_MSG="OPML 更新: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          elif git diff --staged --name-only | grep -q "adaptive_tiers.json"; then
            HAS_NEW_CONTENT=true
            COMMIT_MSG="状态更新: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          fi
          
          if [ "$HAS_NEW_CONTENT" = "true" ]; then
            git commit -m "$COMMIT_MSG"
          else
            echo "No significant changes to commit"
            exit 0
          fi
          
          push_success=false
          for i in 1 2 3 4 5; do
            echo "=== Push attempt $i ==="
            # Abort any existing rebase first
            git rebase --abort 2>/dev/null || true
            git pull --rebase --strategy-option=ours origin main
            rebase_rc=$?
            if [ $rebase_rc -ne 0 ]; then
              echo "Rebase had conflicts, resolving with our changes..."
              git diff --name-only --diff-filter=U | while read conflict_file; do
                echo "Resolving conflict in $conflict_file using our version"
                git checkout --theirs "$conflict_file"
                git add "$conflict_file"
              done
              git rebase --continue 2>/dev/null || {
                echo "Rebase continue failed, trying --skip..."
                git rebase --skip 2>/dev/null || true
              }
            fi
            if git push origin main; then
              push_success=true
              break
            fi
            echo "Push attempt $i failed, waiting before retry..."
            sleep 10
          done
          if [ "$push_success" = true ]; then
            echo "Changes committed and pushed successfully"
            # 写入部署标记文件，通知下游 job 需要部署
            echo "true" > /tmp/needs_deploy.flag
          else
            echo "Failed to push changes after 5 attempts"
            exit 1
          fi
      - name: 输出部署标记
        id: deploy-flag
        if: steps.night-check.outputs.SKIP != 'true'
        run: |
          # 检查提交变更步骤是否写入了部署标记
          if [ -f /tmp/needs_deploy.flag ] && [ "$(cat /tmp/needs_deploy.flag)" = "true" ]; then
            echo "NEEDS_DEPLOY=true" >> $GITHUB_OUTPUT
            echo "检测到 feed 变更，将触发 Pages 部署"
          else
            echo "NEEDS_DEPLOY=false" >> $GITHUB_OUTPUT
            echo "无 feed 变更，跳过 Pages 部署"
          fi
      - name: 上传运行日志
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: run-log-${{ github.run_number }}
          path: run_log.jsonl
          retention-days: 30

  # ======== Pages 部署 job ========
  # 解决 GITHUB_TOKEN push 不触发其他 workflow 的问题
  # 直接在 crawl workflow 中部署，确保每次抓取后 feed 立刻更新到 CDN
  deploy-pages:
    needs: monitor
    if: needs.monitor.outputs.needs_deploy == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package.json

      - name: Install dependencies
        run: npm install

      - name: Build VitePress documentation
        run: npm run docs:build

      - name: Prepare site
        run: |
          mkdir -p _site
          # VitePress 文档构建产物
          if [ -d "docs/.vitepress/dist" ]; then
            cp -r docs/.vitepress/dist/* _site/
          fi
          # 订阅源（feeds）
          if [ -d "feeds" ]; then
            mkdir -p _site/feeds
            cp feeds/*.xml _site/feeds/ 2>/dev/null || true
          fi
          # OPML 文件
          for f in opml.xml opml-*.xml; do
            [ -f "$f" ] && cp "$f" _site/
          done
          # 元数据 JSON
          for f in feeds_meta.json crawl_status.json; do
            [ -f "$f" ] && cp "$f" _site/
          done
          # 公开文件（favicon.svg 等静态资源直接放到站点根目录）
          if [ -d "public" ]; then
            cp -r public/* _site/ 2>/dev/null || true
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
