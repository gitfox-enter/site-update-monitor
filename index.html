<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1,user-scalable=no">
<title>线报聚合 - 实时监控全网羊毛线报</title>
<meta name="description" content="线报聚合：通过自动化爬虫实时监控全网电商、购物平台线报，聚合展示">
<meta name="renderer" content="webkit">
<meta name="apple-mobile-web-app-title" content="线报聚合">

<link rel="manifest" href="manifest.json">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#1976d2;
  --primary-hover:#1565c0;
  --bg:#fff;
  --bg-alt:#f7f8fa;
  --text:#333;
  --text-sec:#666;
  --text-muted:#999;
  --border:#e8e8e8;
  --border-light:#f0f0f0;
  --sidebar-w:200px;
  --header-h:52px;
  --radius:6px;
  --font: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:var(--font);background:var(--bg-alt);color:var(--text);min-height:100vh;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:inherit}

/* ========== HEADER ========== */
#header{
  background:#fff;
  height:var(--header-h);
  display:flex;
  align-items:center;
  padding:0 16px;
  position:sticky;
  top:0;
  z-index:100;
  border-bottom:1px solid var(--border);
  gap:12px;
}
#icon-menu{display:none;font-size:20px;cursor:pointer;color:var(--text);padding:4px 8px;border-radius:4px;flex-shrink:0}
#icon-menu:hover{background:var(--bg-alt)}
#logo{
  font-size:18px;
  font-weight:700;
  color:var(--primary);
  white-space:nowrap;
  flex-shrink:0;
  letter-spacing:-0.5px;
}
.header-divider{width:1px;height:24px;background:var(--border);flex-shrink:0}
#search-form{
  display:flex;
  align-items:center;
  flex:1;
  max-width:360px;
  height:34px;
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  background:#fff;
  transition:border-color .2s;
}
#search-form:focus-within{border-color:var(--primary)}
#search-form svg{width:16px;height:16px;margin-left:10px;color:var(--text-muted);flex-shrink:0}
#search-input{
  border:none;
  outline:none;
  flex:1;
  height:100%;
  padding:0 8px;
  font-size:13px;
  font-family:inherit;
  background:transparent;
  color:var(--text);
}
#search-input::placeholder{color:var(--text-muted)}
#search-btn{
  background:var(--primary);
  color:#fff;
  border:none;
  height:100%;
  padding:0 14px;
  font-size:13px;
  cursor:pointer;
  white-space:nowrap;
  transition:background .2s;
}
#search-btn:hover{background:var(--primary-hover)}
#menu{display:flex;align-items:center;gap:2px;flex-shrink:0}
#menu a{
  padding:6px 14px;
  font-size:14px;
  color:var(--text-sec);
  border-radius:var(--radius);
  cursor:pointer;
  transition:all .15s;
  white-space:nowrap;
}
#menu a:hover{color:var(--primary);background:#e3f2fd}
#menu a.active{color:var(--primary);font-weight:600;background:#e3f2fd}
#icon-search-mobile{display:none;font-size:18px;cursor:pointer;color:var(--text);padding:4px 8px}

/* ========== MAIN LAYOUT ========== */
#app{
  display:flex;
  max-width:1200px;
  margin:0 auto;
  min-height:calc(100vh - var(--header-h));
}

/* ========== SIDEBAR ========== */
#sidebar{
  width:var(--sidebar-w);
  flex-shrink:0;
  background:#fff;
  border-right:1px solid var(--border);
  overflow-y:auto;
  position:sticky;
  top:var(--header-h);
  height:calc(100vh - var(--header-h));
}
#sidebar::-webkit-scrollbar{width:4px}
#sidebar::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
.cat-section{padding:8px 0}
.cat-item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:9px 16px;
  font-size:13px;
  color:var(--text-sec);
  cursor:pointer;
  transition:all .15s;
  border-left:3px solid transparent;
}
.cat-item:hover{background:var(--bg-alt);color:var(--text)}
.cat-item.active{
  color:var(--primary);
  font-weight:600;
  background:#e3f2fd;
  border-left-color:var(--primary);
}
.cat-item .cat-name{
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  flex:1;
}
.cat-item .cat-count{
  font-size:11px;
  color:var(--text-muted);
  background:var(--bg-alt);
  padding:1px 6px;
  border-radius:10px;
  flex-shrink:0;
  margin-left:6px;
  min-width:20px;
  text-align:center;
}
.cat-item.active .cat-count{background:#bbdefb;color:var(--primary)}
.sidebar-divider{height:1px;background:var(--border-light);margin:4px 16px}

/* ========== CONTENT AREA ========== */
#content{
  flex:1;
  min-width:0;
  display:flex;
  flex-direction:column;
}

/* -- View tabs (首页/排行) -- */
#view-bar{
  display:none;
  background:#fff;
  border-bottom:1px solid var(--border);
  padding:0 16px;
}
#view-bar .view-tab{
  display:inline-block;
  padding:10px 16px;
  font-size:14px;
  color:var(--text-sec);
  cursor:pointer;
  border-bottom:2px solid transparent;
  transition:all .15s;
}
#view-bar .view-tab:hover{color:var(--primary)}
#view-bar .view-tab.active{color:var(--primary);font-weight:600;border-bottom-color:var(--primary)}

/* -- Status bar -- */
#status-bar{
  padding:10px 16px;
  font-size:12px;
  color:var(--text-muted);
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#fff;
  border-bottom:1px solid var(--border-light);
}
#status-bar .highlight{color:var(--primary);font-weight:500}

/* ========== ITEM LIST ========== */
.list-wrap{background:#fff;flex:1}
.list-empty{
  padding:60px 20px;
  text-align:center;
  color:var(--text-muted);
  font-size:14px;
}
.item{
  border-bottom:1px solid var(--border-light);
  transition:background .1s;
}
.item:hover{background:#fafbfc}
.item>a{
  display:flex;
  align-items:center;
  padding:11px 16px;
  gap:10px;
  color:var(--text);
  transition:color .15s;
}
.item>a:hover .item-title{color:var(--primary)}
.src-badge{
  width:26px;
  height:26px;
  border-radius:4px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:13px;
  font-weight:700;
  flex-shrink:0;
  line-height:1;
}
.item-body{flex:1;min-width:0}
.item-title{
  font-size:14px;
  font-weight:400;
  color:var(--text);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  line-height:1.5;
  transition:color .15s;
}
.item-meta{
  display:flex;
  align-items:center;
  gap:12px;
  margin-top:2px;
  font-size:12px;
  color:var(--text-muted);
}
.item-meta svg{width:12px;height:12px;vertical-align:-1px;margin-right:2px}
.platform-tag{
  font-size:11px;
  color:var(--primary);
  border:1px solid #bbdefb;
  border-radius:3px;
  padding:0 5px;
  line-height:1.6;
  background:#e3f2fd;
}
.price-hl{color:#e53935;font-weight:600}

/* ========== PAGINATION ========== */
#pagination{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  padding:16px;
  background:#fff;
  border-top:1px solid var(--border-light);
}
.page-btn{
  padding:6px 16px;
  font-size:13px;
  color:var(--text-sec);
  background:#fff;
  border:1px solid var(--border);
  border-radius:var(--radius);
  cursor:pointer;
  transition:all .15s;
}
.page-btn:hover{border-color:var(--primary);color:var(--primary)}
.page-btn.disabled{opacity:.4;pointer-events:none}
#page-select{
  padding:6px 8px;
  font-size:13px;
  border:1px solid var(--border);
  border-radius:var(--radius);
  background:#fff;
  color:var(--text);
  min-width:80px;
}

/* ========== RANKING SECTION ========== */
#ranking-section{
  background:#fff;
  margin-top:8px;
  border-top:1px solid var(--border);
}
.ranking-tabs{
  display:flex;
  border-bottom:1px solid var(--border-light);
}
.ranking-tab{
  flex:1;
  padding:10px 0;
  font-size:13px;
  color:var(--text-sec);
  background:none;
  border:none;
  cursor:pointer;
  text-align:center;
  border-bottom:2px solid transparent;
  transition:all .15s;
}
.ranking-tab:hover{color:var(--primary)}
.ranking-tab.active{color:var(--primary);font-weight:600;border-bottom-color:var(--primary)}
.ranking-list{list-style:none;padding:0}
.ranking-item{
  display:flex;
  align-items:center;
  padding:10px 16px;
  gap:10px;
  border-bottom:1px solid var(--border-light);
  transition:background .1s;
}
.ranking-item:hover{background:#fafbfc}
.ranking-item:last-child{border-bottom:none}
.rank-num{
  width:22px;
  height:22px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  font-weight:700;
  flex-shrink:0;
  background:var(--bg-alt);
  color:var(--text-muted);
}
.rank-num.top1{background:#fff3e0;color:#ef6c00}
.rank-num.top2{background:#e3f2fd;color:#1976d2}
.rank-num.top3{background:#e8f5e9;color:#2e7d32}
.ranking-item .src-badge{width:22px;height:22px;font-size:11px}
.ranking-item .rank-title{
  flex:1;
  min-width:0;
  font-size:13px;
  color:var(--text);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.ranking-item .rank-count{
  font-size:12px;
  color:var(--text-muted);
  flex-shrink:0;
}
.ranking-empty{
  padding:30px 16px;
  text-align:center;
  color:var(--text-muted);
  font-size:13px;
}

/* ========== FOOTER ========== */
#footer{
  text-align:center;
  padding:20px 16px;
  font-size:12px;
  color:var(--text-muted);
  background:var(--bg-alt);
}
#footer a{color:var(--text-muted);margin:0 6px}
#footer a:hover{color:var(--primary)}

/* ========== MOBILE DROPDOWN (category) ========== */
#cat-dropdown{
  display:none;
  background:#fff;
  border-bottom:1px solid var(--border);
  max-height:0;
  overflow:hidden;
  transition:max-height .3s ease;
  position:sticky;
  top:var(--header-h);
  z-index:90;
}
#cat-dropdown.open{max-height:320px;overflow-y:auto}
#cat-dropdown .cat-item{padding:10px 20px;border-left:none}
#cat-dropdown .cat-item.active{background:#e3f2fd;border-left:none}
#cat-toggle-bar{
  display:none;
  background:#fff;
  padding:8px 16px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  font-size:13px;
  color:var(--text-sec);
  position:sticky;
  top:var(--header-h);
  z-index:91;
}
#cat-toggle-bar:hover{background:var(--bg-alt)}
#cat-toggle-bar .toggle-arrow{
  display:inline-block;
  transition:transform .2s;
  margin-right:6px;
  font-size:10px;
}
#cat-toggle-bar.open .toggle-arrow{transform:rotate(90deg)}

/* ========== BACK TO TOP ========== */
#back-top{
  position:fixed;
  bottom:24px;
  right:24px;
  width:40px;
  height:40px;
  border-radius:50%;
  background:#fff;
  border:1px solid var(--border);
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:all .2s;
  z-index:50;
}
#back-top.show{opacity:1;pointer-events:auto}
#back-top:hover{border-color:var(--primary);color:var(--primary)}
#back-top svg{width:18px;height:18px}

/* ========== LOADING ========== */
.loading{
  padding:40px 20px;
  text-align:center;
  color:var(--text-muted);
  font-size:14px;
}
.loading::before{
  content:"";
  display:inline-block;
  width:20px;
  height:20px;
  border:2px solid var(--border);
  border-top-color:var(--primary);
  border-radius:50%;
  animation:spin .6s linear infinite;
  margin-right:8px;
  vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ========== RESPONSIVE ========== */
@media(max-width:960px){
  #sidebar{display:none}
  #icon-menu{display:block}
  #cat-toggle-bar{display:flex;align-items:center}
  #cat-dropdown{display:block}
  #menu a.hide-mobile{display:none}
  #view-bar{display:flex}
  #search-form{max-width:none}
  .header-divider{display:none}
  #app{flex-direction:column}
}
@media(max-width:600px){
  #header{padding:0 10px;gap:8px}
  #logo{font-size:16px}
  #search-form{height:32px}
  #search-btn{padding:0 10px;font-size:12px}
  #menu a{padding:6px 8px;font-size:13px}
  .item>a{padding:10px 12px;gap:8px}
  .item-title{font-size:13px}
  .src-badge{width:24px;height:24px;font-size:12px}
  #footer{padding:16px 12px}
  #back-top{bottom:16px;right:16px;width:36px;height:36px}
}
</style>
</head>

function normalizeSource(raw) {

function detectPlatform(item) {
  var text = (item.text || '') + ' ' + (item.url || '');
  for (var i = 0; i < PLATFORM_RULES.length; i++) {
    var r = PLATFORM_RULES[i];
    for (var j = 0; j < r.kw.length; j++) {
      if (text.indexOf(r.kw[j]) !== -1) return r.name;
    }
  }
  return null;
}

/* ================================================================
   PRICE HIGHLIGHTING
   ================================================================ */
var PRICE_RE = /((?:到手|约|仅需|券后|实付|折合|折后|大概)?[¥￥]?\d+(?:\.\d+)?(?:元|块|亓|￥)?)/g;
function highlightPrice(text) {
  return text.replace(PRICE_RE, '<span class="price-hl">$1</span>');
}

/* ================================================================
   TIME FORMATTING
   ================================================================ */
function formatTime(t) {
  if (!t) return '';
  return t.replace(/^\d{4}-/, '').replace(/:\d{2}$/, '');
}

/* ================================================================
   DATA LOADING
   ================================================================ */
function loadData() {
  document.getElementById('item-list').innerHTML = '<div class="loading">加载中</div>';

  fetch('items.json?t=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var rawItems = data.items || [];
      /* Normalize sources & detect platform */
      allItems = rawItems.map(function(it) {
        return {
          url: it.url || '',
          text: (it.text || '').trim(),
          source: normalizeSource(it.source),
          rawSource: it.source || '',
          time: it.time || '',
          category: it.category || null,
          platform: detectPlatform(it)
        };
      });

      /* Build source stats */
      var srcMap = {};
      allItems.forEach(function(it) {
        srcMap[it.source] = (srcMap[it.source] || 0) + 1;
      });
      sources = Object.keys(srcMap).map(function(name) {
        return { name: name, count: srcMap[name], color: getSourceColor(name) };
      }).sort(function(a, b) { return b.count - a.count; });

      buildSidebar();
      buildMobileDropdown();
      renderAll();
      updateStatus();
    })
    .catch(function(err) {
      document.getElementById('item-list').innerHTML =
        '<div class="list-empty">加载失败，请刷新重试<br><small>' + err.message + '</small></div>';
    });
}

/* ================================================================
   SIDEBAR
   ================================================================ */
function buildSidebar() {
  var container = document.getElementById('sidebar-cats');
  var html = '<div class="cat-item' + (activeSource === 'all' ? ' active' : '') + '" data-src="all" onclick="selectSource(\'all\')">' +
    '<span class="cat-name">全部线报</span>' +
    '<span class="cat-count">' + allItems.length + '</span></div>';

  sources.forEach(function(s) {
    var isActive = activeSource === s.name;
    html += '<div class="cat-item' + (isActive ? ' active' : '') + '" data-src="' + escAttr(s.name) + '" onclick="selectSource(\'' + escAttr(s.name) + '\')">' +
      '<span class="cat-name">' + esc(s.name) + '</span>' +
      '<span class="cat-count">' + s.count + '</span></div>';
  });

  container.innerHTML = html;
}

function buildMobileDropdown() {
  var container = document.getElementById('cat-dropdown');
  var html = '<div class="cat-item' + (activeSource === 'all' ? ' active' : '') + '" onclick="selectSource(\'all\');closeCatDropdown()">' +
    '<span class="cat-name">全部线报</span>' +
    '<span class="cat-count">' + allItems.length + '</span></div>';

  sources.forEach(function(s) {
    var isActive = activeSource === s.name;
    html += '<div class="cat-item' + (isActive ? ' active' : '') + '" onclick="selectSource(\'' + escAttr(s.name) + '\');closeCatDropdown()">' +
      '<span class="cat-name">' + esc(s.name) + '</span>' +
      '<span class="cat-count">' + s.count + '</span></div>';
  });

  container.innerHTML = html;
}

function selectSource(name) {
  activeSource = name;
  currentPage = 1;
  buildSidebar();
  buildMobileDropdown();
  renderList();
  updateStatus();
  /* Update toggle bar text */
  var toggleText = document.getElementById('cat-toggle-text');
  toggleText.textContent = name === 'all' ? '全部线报' : name;
  /* Scroll to top of list */
  window.scrollTo({top: 0, behavior: 'smooth'});
}

/* ================================================================
   FILTERING
   ================================================================ */
function getFiltered() {
  var filtered = allItems;

  /* Source filter */
  if (activeSource !== 'all') {
    filtered = filtered.filter(function(it) { return it.source === activeSource; });
  }

  /* Search filter */
  if (searchQuery) {
    var q = searchQuery.toLowerCase();
    filtered = filtered.filter(function(it) {
      return it.text.toLowerCase().indexOf(q) !== -1 ||
             it.source.toLowerCase().indexOf(q) !== -1 ||
             (it.platform && it.platform.toLowerCase().indexOf(q) !== -1);
    });
  }

  return filtered;
}

/* ================================================================
   RENDERING
   ================================================================ */
function renderAll() {
  renderList();
  renderRanking();
}

function renderList() {
  var filtered = getFiltered();
  var total = filtered.length;
  var totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;

  var start = (currentPage - 1) * PAGE_SIZE;
  var pageItems = filtered.slice(start, start + PAGE_SIZE);

  var container = document.getElementById('item-list');

  if (total === 0) {
    container.innerHTML = '<div class="list-empty">暂无相关线报</div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  var html = '';
  pageItems.forEach(function(it) {
    var char = getSourceChar(it.source);
    var color = getSourceColor(it.source);
    var title = highlightPrice(esc(it.text));
    var time = formatTime(it.time);
    var platformHtml = it.platform ? '<span class="platform-tag">' + esc(it.platform) + '</span>' : '';

    html += '<div class="item">' +
      '<a href="' + escAttr(it.url) + '" target="_blank" rel="noopener">' +
        '<span class="src-badge" style="background:' + color + '">' + esc(char) + '</span>' +
        '<div class="item-body">' +
          '<div class="item-title">' + title + '</div>' +
          '<div class="item-meta">' +
            '<span>' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' +
              esc(time) +
            '</span>' +
            platformHtml +
          '</div>' +
        '</div>' +
      '</a>' +
    '</div>';
  });

  container.innerHTML = html;
  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  var container = document.getElementById('pagination');
  if (totalPages <= 1) {
    container.innerHTML = '';
    return;
  }

  var prevClass = currentPage <= 1 ? 'page-btn disabled' : 'page-btn';
  var nextClass = currentPage >= totalPages ? 'page-btn disabled' : 'page-btn';

  var selectHtml = '<select id="page-select" onchange="goToPage(this.value)">';
  for (var i = 1; i <= totalPages; i++) {
    selectHtml += '<option value="' + i + '"' + (i === currentPage ? ' selected' : '') + '>第 ' + i + ' 页</option>';
  }
  selectHtml += '</select>';

  container.innerHTML =
    '<button class="' + prevClass + '" onclick="goToPage(' + (currentPage - 1) + ')">上一页</button>' +
    selectHtml +
    '<button class="' + nextClass + '" onclick="goToPage(' + (currentPage + 1) + ')">下一页</button>';
}

function goToPage(p) {
  p = parseInt(p);
  var filtered = getFiltered();
  var totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  renderList();
  updateStatus();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

/* ================================================================
   RANKING
   ================================================================ */
function renderRanking() {
  var now = new Date();
  var hours = {'1h': 1, '3h': 3, '6h': 6};
  var h = hours[currentRankTab] || 1;
  var cutoff = new Date(now.getTime() - h * 3600000);

  /* Filter items within time window */
  var recent = allItems.filter(function(it) {
    if (!it.time) return false;
    var t = new Date(it.time.replace(' ', 'T'));
    return t >= cutoff;
  });

  /* Group by source */
  var srcCount = {};
  var srcLatest = {};
  recent.forEach(function(it) {
    srcCount[it.source] = (srcCount[it.source] || 0) + 1;
    if (!srcLatest[it.source] || it.time > srcLatest[it.source]) {
      srcLatest[it.source] = it.time;
    }
  });

  var ranked = Object.keys(srcCount).map(function(name) {
    return {name: name, count: srcCount[name], latest: srcLatest[name]};
  }).sort(function(a, b) {
    return b.count - a.count || (b.latest > a.latest ? 1 : -1);
  }).slice(0, 15);

  var container = document.getElementById('ranking-list');

  if (ranked.length === 0) {
    container.innerHTML = '<div class="ranking-empty">该时段暂无数据</div>';
    return;
  }

  var html = '';
  ranked.forEach(function(r, i) {
    var rankClass = 'rank-num';
    if (i === 0) rankClass += ' top1';
    else if (i === 1) rankClass += ' top2';
    else if (i === 2) rankClass += ' top3';

    var char = getSourceChar(r.name);
    var color = getSourceColor(r.name);

    /* Find a sample item title for this source in the time window */
    var sampleTitle = '';
    for (var j = 0; j < recent.length; j++) {
      if (recent[j].source === r.name) {
        sampleTitle = recent[j].text;
        break;
      }
    }

    html += '<div class="ranking-item">' +
      '<span class="' + rankClass + '">' + (i + 1) + '</span>' +
      '<span class="src-badge" style="background:' + color + '">' + esc(char) + '</span>' +
      '<span class="rank-title">' + esc(sampleTitle) + '</span>' +
      '<span class="rank-count">' + r.count + '条</span>' +
    '</div>';
  });

  container.innerHTML = html;
}

function switchRankTab(period) {
  currentRankTab = period;
  document.querySelectorAll('.ranking-tab').forEach(function(el) {
    el.classList.toggle('active', el.getAttribute('data-period') === period);
  });
  renderRanking();
}

/* ================================================================
   VIEW SWITCHING
   ================================================================ */
function switchView(view) {
  currentView = view;

  /* Update menu */
  document.querySelectorAll('#menu a').forEach(function(el) {
    el.classList.toggle('active', el.getAttribute('data-view') === view);
  });
  document.querySelectorAll('#view-bar .view-tab').forEach(function(el) {
    el.classList.toggle('active', el.getAttribute('data-view') === view);
  });

  /* Show/hide sections */
  document.getElementById('list-view').style.display = view === 'list' ? '' : 'none';
  document.getElementById('ranking-view').style.display = view === 'ranking' ? '' : 'none';

  if (view === 'ranking') renderRanking();
}

/* ================================================================
   SEARCH
   ================================================================ */
function handleSearch(e) {
  e.preventDefault();
  searchQuery = document.getElementById('search-input').value.trim();
  currentPage = 1;
  renderList();
  updateStatus();
}

/* ================================================================
   STATUS
   ================================================================ */
function updateStatus() {
  var filtered = getFiltered();
  var el = document.getElementById('status-text');
  var parts = [];

  if (activeSource !== 'all') {
    parts.push('来源: <span class="highlight">' + esc(activeSource) + '</span>');
  }
  if (searchQuery) {
    parts.push('搜索: <span class="highlight">"' + esc(searchQuery) + '"</span>');
  }
  parts.push('共 ' + filtered.length + ' 条线报');

  el.innerHTML = parts.join(' · ');
}

/* ================================================================
   MOBILE CATEGORY DROPDOWN
   ================================================================ */
var catDropdownOpen = false;
function toggleCatDropdown() {
  catDropdownOpen = !catDropdownOpen;
  var dd = document.getElementById('cat-dropdown');
  var bar = document.getElementById('cat-toggle-bar');
  dd.classList.toggle('open', catDropdownOpen);
  bar.classList.toggle('open', catDropdownOpen);
}
function closeCatDropdown() {
  catDropdownOpen = false;
  document.getElementById('cat-dropdown').classList.remove('open');
  document.getElementById('cat-toggle-bar').classList.remove('open');
}

/* ================================================================
   BACK TO TOP
   ================================================================ */
window.addEventListener('scroll', function() {
  document.getElementById('back-top').classList.toggle('show', window.scrollY > 300);
});

/* ================================================================
   UTILITIES
   ================================================================ */
function esc(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function escAttr(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

/* ================================================================
   SERVICE WORKER
   ================================================================ */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function(){});
}

/* ================================================================
   INIT
   ================================================================ */
loadData();
</script>
</body>
</html>
