<!DOCTYPE html>

<style>
/* ========== CSS RESET & CUSTOM PROPERTIES ========== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --primary: #e85d04;
  --primary-dark: #c94d03;
  --primary-light: #fff0e6;
  --primary-gradient: linear-gradient(135deg, #e85d04 0%, #dc2f02 50%, #d00000 100%);
  --bg: #f5f0eb;
  --bg-alt: #ede7e0;
  --surface: #ffffff;
  --surface-hover: #fffbf7;
  --text: #1a1a1a;
  --text-secondary: #555;
  --text-muted: #999;
  --text-light: #bbb;
  --border: #e8e0d8;
  --border-light: #f0ebe5;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
  --shadow: 0 2px 8px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  --shadow-primary: 0 4px 20px rgba(232,93,4,0.25);
  --radius-sm: 8px;
  --radius: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --header-height: 60px;
  --max-width: 860px;
  --transition: 0.2s ease;
  --transition-slow: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ========== BASE ========== */
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

body {
  font-family: "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

a { color: inherit; text-decoration: none; }

/* ========== HEADER ========== */
.header {
  background: var(--primary);
  color: #fff;
  height: var(--header-height);
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: 0 2px 16px rgba(232,93,4,0.35);
}

.header-left {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.logo {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.3px;
  white-space: nowrap;
}

.badge-auto {
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(4px);
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.3px;
  white-space: nowrap;
}

.header-count {
  font-size: 12px;
  opacity: 0.85;
  white-space: nowrap;
  margin-left: 2px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn-icon {
  background: rgba(255,255,255,0.15);
  border: none;
  color: #fff;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background var(--transition);
  font-size: 18px;
  flex-shrink: 0;
}

.btn-icon:hover { background: rgba(255,255,255,0.3); }
.btn-icon.active { background: rgba(255,255,255,0.35); }

.btn-icon svg {
  width: 18px;
  height: 18px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* ========== SEARCH PANEL (slides down from header) ========== */
.search-panel {
  background: var(--primary-dark);
  overflow: hidden;
  max-height: 0;
  transition: max-height var(--transition-slow), padding var(--transition-slow);
  padding: 0 20px;
}

.search-panel.open {
  max-height: 90px;
  padding: 10px 20px;
}

.search-panel-inner {
  max-width: var(--max-width);
  margin: 0 auto;
  position: relative;
}

.search-input {
  width: 100%;
  height: 42px;
  border: none;
  border-radius: var(--radius-sm);
  padding: 0 40px 0 42px;
  font-size: 14px;
  font-family: inherit;
  background: rgba(255,255,255,0.15);
  color: #fff;
  outline: none;
  transition: background var(--transition), box-shadow var(--transition);
}

.search-input::placeholder { color: rgba(255,255,255,0.6); }
.search-input:focus {
  background: rgba(255,255,255,0.25);
  box-shadow: 0 0 0 2px rgba(255,255,255,0.3);
}

.search-icon-inner {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  opacity: 0.5;
  pointer-events: none;
}

.search-clear {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.3);
  border: none;
  color: #fff;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 14px;
  display: none;
  align-items: center;
  justify-content: center;
  transition: background var(--transition);
}

.search-clear.visible { display: flex; }
.search-clear:hover { background: rgba(255,255,255,0.5); }

.search-result-count {
  color: rgba(255,255,255,0.8);
  font-size: 12px;
  margin-top: 4px;
  padding-left: 4px;
  min-height: 16px;
}

/* ========== SOURCE FILTER PANEL (slides down) ========== */
.source-panel {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow: hidden;
  max-height: 0;
  transition: max-height var(--transition-slow);
  box-shadow: var(--shadow-md);
  position: relative;
  z-index: 150;
}

.source-panel.open {
  max-height: 500px;
  overflow-y: auto;
}

.source-panel-inner {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 20px 20px 24px;
}

.source-panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.source-panel-header h3 {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
}

.source-panel-actions {
  display: flex;
  gap: 8px;
}

.source-panel-actions button {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 12px;
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
  color: var(--text-secondary);
  transition: all var(--transition);
}

.source-panel-actions button:hover {
  border-color: var(--primary);
  color: var(--primary);
}

.source-panel-count {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 12px;
}

.source-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 8px;
}

.source-check {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--bg);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background var(--transition);
  user-select: none;
  font-size: 13px;
}

.source-check:hover { background: var(--bg-alt); }

.source-check input[type="checkbox"] {
  accent-color: var(--primary);
  width: 16px;
  height: 16px;
  cursor: pointer;
  flex-shrink: 0;
}

.source-check-name {
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-weight: 500;
  color: var(--text);
}

.source-check-count {
  font-size: 11px;
  color: var(--text-muted);
  flex-shrink: 0;
}

/* ========== HERO ========== */
.hero {
  background: var(--primary-gradient);
  color: #fff;
  padding: 40px 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: "";
  position: absolute;
  top: -40%;
  right: -10%;
  width: 300px;
  height: 300px;
  background: rgba(255,255,255,0.06);
  border-radius: 50%;
  pointer-events: none;
}

.hero::after {
  content: "";
  position: absolute;
  bottom: -30%;
  left: -5%;
  width: 200px;
  height: 200px;
  background: rgba(255,255,255,0.04);
  border-radius: 50%;
  pointer-events: none;
}

.hero-content { position: relative; z-index: 1; }

.hero h1 {
  font-size: 26px;
  font-weight: 700;
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}

.hero-subtitle {
  font-size: 14px;
  opacity: 0.85;
  max-width: 440px;
  margin: 0 auto 16px;
  line-height: 1.7;
}

.hero-stats {
  display: flex;
  justify-content: center;
  gap: 24px;
  font-size: 13px;
  opacity: 0.8;
}

.hero-stat {
  display: flex;
  align-items: center;
  gap: 6px;
}

.hero-stat svg {
  width: 14px;
  height: 14px;
  opacity: 0.7;
}

/* ========== MAIN CONTENT ========== */
.main {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 16px 16px 80px;
}

/* ========== STATUS BAR ========== */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 4px;
  margin-bottom: 8px;
  font-size: 13px;
  color: var(--text-muted);
}

.status-bar .search-result-info {
  color: var(--primary);
  font-weight: 500;
}

/* ========== ITEM LIST ========== */
.item-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.item-card {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-left: 3px solid transparent;
  border-radius: var(--radius);
  padding: 14px 18px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  color: var(--text);
  transition: all var(--transition);
  cursor: pointer;
  position: relative;
}

.item-card:hover {
  border-left-color: var(--primary);
  background: var(--surface-hover);
  box-shadow: var(--shadow-md);
}

.item-card.expanded {
  border-left-color: var(--primary);
  background: var(--surface-hover);
  box-shadow: var(--shadow-md);
}

.item-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-top: 8px;
  flex-shrink: 0;
  transition: transform var(--transition);
}

.item-card:hover .item-dot { transform: scale(1.4); }

.item-body {
  flex: 1;
  min-width: 0;
}

.item-title {
  font-size: 14.5px;
  font-weight: 500;
  line-height: 1.6;
  color: var(--text);
  word-break: break-all;
  display: -webkit-box;
  -webkit-line-clamp: 1;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.item-card.expanded .item-title {
  -webkit-line-clamp: unset;
  display: block;
}

.item-card:hover .item-title { color: var(--primary); }

/* Expanded detail area */
.item-detail {
  max-height: 0;
  overflow: hidden;
  transition: max-height var(--transition-slow), margin var(--transition-slow), opacity var(--transition-slow);
  opacity: 0;
  margin-top: 0;
}

.item-card.expanded .item-detail {
  max-height: 300px;
  opacity: 1;
  margin-top: 12px;
}

.item-detail-inner {
  padding-top: 12px;
  border-top: 1px solid var(--border-light);
}

.item-detail-row {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

.item-detail-row:last-child { margin-bottom: 0; }

.item-detail-label {
  color: var(--text-muted);
  font-size: 12px;
  flex-shrink: 0;
}

.item-detail-value {
  font-weight: 500;
}

.btn-go {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-top: 10px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  padding: 8px 20px;
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: background var(--transition), box-shadow var(--transition);
  text-decoration: none;
}

.btn-go:hover {
  background: var(--primary-dark);
  box-shadow: var(--shadow-primary);
}

.item-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 5px;
  flex-shrink: 0;
  min-width: 80px;
}

.item-source {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 10px;
  border-radius: 20px;
  white-space: nowrap;
  letter-spacing: 0.2px;
}

.item-time {
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
}

/* ========== PRICE HIGHLIGHT ========== */
.price-hl {
  background: linear-gradient(135deg, #fff0e6, #ffe0cc);
  color: var(--primary-dark);
  font-weight: 700;
  padding: 1px 4px;
  border-radius: 3px;
}

/* ========== LOAD MORE ========== */
.load-more-wrap {
  text-align: center;
  padding: 24px 0;
}

.btn-load-more {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 10px 32px;
  font-size: 14px;
  font-weight: 500;
  font-family: inherit;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition);
}

.btn-load-more:hover {
  border-color: var(--primary);
  color: var(--primary);
  box-shadow: var(--shadow);
}

/* ========== LOADING SPINNER ========== */
.loading {
  text-align: center;
  padding: 60px 20px;
}

.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-text {
  font-size: 14px;
  color: var(--text-muted);
}

/* ========== EMPTY STATE ========== */
.empty-state {
  text-align: center;
  padding: 60px 20px;
}

.empty-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.4;
}

.empty-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

.empty-desc {
  font-size: 13px;
  color: var(--text-muted);
}

/* ========== ERROR STATE ========== */
.error-state {
  text-align: center;
  padding: 60px 20px;
}

.error-icon { font-size: 48px; margin-bottom: 16px; }

.error-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

.error-desc {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 20px;
}

.btn-retry {
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  padding: 10px 28px;
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: background var(--transition);
}

.btn-retry:hover { background: var(--primary-dark); }

/* ========== SCROLL SENTINEL ========== */
.scroll-sentinel {
  height: 1px;
  width: 100%;
}

/* ========== BACK TO TOP ========== */
.back-to-top {
  position: fixed;
  bottom: 28px;
  right: 28px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--primary);
  color: #fff;
  border: none;
  cursor: pointer;
  box-shadow: var(--shadow-primary);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  visibility: hidden;
  transform: translateY(12px);
  transition: all var(--transition-slow);
  z-index: 100;
}

.back-to-top.visible {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}

.back-to-top:hover {
  background: var(--primary-dark);
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(232,93,4,0.35);
}

.back-to-top svg { width: 20px; height: 20px; }

/* ========== FOOTER ========== */
.footer {
  text-align: center;
  padding: 28px 16px;
  color: var(--text-muted);
  font-size: 12px;
  border-top: 1px solid var(--border);
  background: var(--surface);
}

.footer a {
  color: var(--primary);
  text-decoration: none;
  font-weight: 500;
}

.footer a:hover { text-decoration: underline; }

/* ========== SOURCE COLORS ========== */
.src-color-0  { background: #fff0e6; color: #e85d04; }
.src-color-1  { background: #e8f5e9; color: #2e7d32; }
.src-color-2  { background: #e3f2fd; color: #1565c0; }
.src-color-3  { background: #fce4ec; color: #c62828; }
.src-color-4  { background: #f3e5f5; color: #7b1fa2; }
.src-color-5  { background: #e0f2f1; color: #00695c; }
.src-color-6  { background: #fff3e0; color: #e65100; }
.src-color-7  { background: #e8eaf6; color: #283593; }
.src-color-8  { background: #fbe9e7; color: #bf360c; }
.src-color-9  { background: #e1f5fe; color: #0277bd; }
.src-color-10 { background: #f1f8e9; color: #33691e; }
.src-color-11 { background: #fff8e1; color: #f57f17; }

.dot-color-0  { background: #e85d04; }
.dot-color-1  { background: #2e7d32; }
.dot-color-2  { background: #1565c0; }
.dot-color-3  { background: #c62828; }
.dot-color-4  { background: #7b1fa2; }
.dot-color-5  { background: #00695c; }
.dot-color-6  { background: #e65100; }
.dot-color-7  { background: #283593; }
.dot-color-8  { background: #bf360c; }
.dot-color-9  { background: #0277bd; }
.dot-color-10 { background: #33691e; }
.dot-color-11 { background: #f57f17; }

/* ========== ANIMATIONS ========== */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.item-card { animation: fadeInUp 0.3s ease both; }

/* ========== RESPONSIVE ========== */
@media (max-width: 768px) {
  .header { padding: 0 12px; }
  .header-count { display: none; }
  .hero { padding: 28px 16px; }
  .hero h1 { font-size: 20px; }
  .hero-subtitle { font-size: 13px; }
  .hero-stats { gap: 16px; font-size: 12px; }
  .main { padding: 12px 10px 80px; }
  .item-card { padding: 12px 14px; gap: 10px; }
  .item-title { font-size: 14px; }
  .item-meta { min-width: 70px; }
  .item-source { font-size: 10px; padding: 2px 8px; }
  .item-time { font-size: 10px; }
  .source-grid { grid-template-columns: 1fr; }
  .source-panel-inner { padding: 16px 12px 20px; }
  .search-panel.open { padding: 10px 12px; }
  .back-to-top { bottom: 20px; right: 16px; width: 40px; height: 40px; }
}

@media (min-width: 769px) {
  .item-meta { min-width: 120px; }
}

/* ========== SOURCE TABS BAR ========== */
.source-tabs-wrapper {
  position: sticky;
  top: var(--header-height);
  z-index: 150;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}
.source-tabs {
  max-width: var(--max-width);
  margin: 0 auto;
  display: flex;
  gap: 6px;
  padding: 10px 16px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.source-tabs::-webkit-scrollbar { display: none; }
.source-tab {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  background: var(--bg);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
  user-select: none;
}
.source-tab:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: var(--primary-light);
}
.source-tab.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
  box-shadow: 0 2px 8px rgba(232,93,4,0.25);
}
.source-tab .tab-count {
  display: inline-block;
  margin-left: 4px;
  font-size: 11px;
  opacity: 0.7;
}
@media (max-width: 768px) {
  .source-tabs { padding: 8px 12px; gap: 5px; }
  .source-tab { padding: 5px 11px; font-size: 12px; }
}
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="header">
  <div class="header-left">
    <div class="logo">&#x26A1; 线报聚合</div>
    <span class="badge-auto">自动更新</span>
    <span class="header-count" id="headerCount"></span>

  <div class="header-right">

  <p>自动更新 &middot; 永不停止 &middot; <a href="https://github.com/gitfox-enter/site-update-monitor" target="_blank" rel="noopener">GitHub</a></p>
</footer>

<script>
/* ================================================================
   线报聚合 - 主应用逻辑
   ================================================================ */
(function () {
  "use strict";

  /* ---- Constants ---- */
  var PAGE_SIZE = 30;
  var DEBOUNCE_MS = 250;

  /* ---- State ---- */
  var allItems = [];
  var updatedAt = "";
  var sourceMap = {};          // source -> colorIndex
  var sourceList = [];         // [{name, count}]
  var selectedSources = {};    // sourceName -> true/false
  var searchQuery = "";
  var filteredItems = [];
  var displayedCount = 0;
  var isLoading = false;
  var expandedCardId = null;   // currently expanded card index
  var activeSourceTab = "all"; // "all" or a source name

  /* ---- DOM refs ---- */
  var $mainContent     = document.getElementById("mainContent");
  var $searchPanel     = document.getElementById("searchPanel");
  var $searchInput     = document.getElementById("searchInput");
  var $searchClear     = document.getElementById("searchClear");
  var $searchResultCnt = document.getElementById("searchResultCount");
  var $btnSearch       = document.getElementById("btnSearch");
  var $btnSourceFilter = document.getElementById("btnSourceFilter");
  var $sourcePanel     = document.getElementById("sourcePanel");
  var $sourceGrid      = document.getElementById("sourceGrid");
  var $sourcePanelCnt  = document.getElementById("sourcePanelCount");
  var $headerCount     = document.getElementById("headerCount");
  var $heroTime        = document.getElementById("heroTime");
  var $heroTotal       = document.getElementById("heroTotal");
  var $backToTop       = document.getElementById("backToTop");
  var $sourceTabs      = document.getElementById("sourceTabs");

  /* ---- Utility ---- */
  function escapeHtml(str) {
    var div = document.createElement("div");
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  function debounce(fn, ms) {
    var timer;
    return function () {
      var ctx = this, args = arguments;
      clearTimeout(timer);
      timer = setTimeout(function () { fn.apply(ctx, args); }, ms);
    };
  }

  function getSourceColorIndex(source) {
    if (!(source in sourceMap)) {
      sourceMap[source] = Object.keys(sourceMap).length % 12;
    }
    return sourceMap[source];
  }

  function formatRelativeTime(timeStr) {
    if (!timeStr) return "";
    var d = new Date(timeStr.replace(" ", "T"));
    if (isNaN(d.getTime())) return timeStr;
    var now = new Date();
    var diffMs = now - d;
    var diffMin = Math.floor(diffMs / 60000);
    if (diffMin < 1) return "刚刚";
    if (diffMin < 60) return diffMin + " 分钟前";
    var diffHr = Math.floor(diffMin / 60);
    if (diffHr < 24) return diffHr + " 小时前";
    var diffDay = Math.floor(diffHr / 24);
    if (diffDay < 7) return diffDay + " 天前";
    return timeStr.slice(5, 16);
  }

  function extractDomain(url) {
    try {
      var u = new URL(url);
      return u.hostname;
    } catch (e) {
      return "";
    }
  }

  /* ---- Price Highlighting ---- */
  function highlightPrices(text) {
    var escaped = escapeHtml(text);
    // Apply patterns in order: prefix-keywords first, then currency symbols, then suffix-keywords.
    // Deduplication: if the match is already inside a price-hl span, skip it.
    var patterns = [
      /((?:到手价|到手|优惠|特价|仅需|秒杀价|活动价|券后价|凑单价|折后)[\s:]*(\d+(?:\.\d{1,2})?))/g,
      /([¥￥]\s*(\d+(?:\.\d{1,2})?))/g,
      /((\d+(?:\.\d{1,2})?)\s*[元亓块])/g
    ];

    var result = escaped;
    for (var i = 0; i < patterns.length; i++) {
      result = result.replace(patterns[i], function (match, p1, p2, offset, string) {
        // Prevent double-wrapping: check if this match is preceded by a price-hl span
        var preStart = Math.max(0, offset - 24);
        var preceding = string.substring(preStart, offset);
        if (preceding.indexOf('class="price-hl">') !== -1) {
          return match;
        }
        return '<span class="price-hl">' + match + '</span>';
      });
    }
    return result;
  }

  /* ---- Data fetching ---- */
  function fetchData() {
    isLoading = true;
    showLoading();
    fetch("items.json?t=" + Date.now())
      .then(function (r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(function (data) {
        allItems = data.items || [];
        updatedAt = data.updated_at || "";
        isLoading = false;
        init();
      })
      .catch(function (err) {
        isLoading = false;
        showError(err.message);
      });
  }

  /* ---- Initialization after data load ---- */
  function init() {
    // Pre-compute source colors and list
    var sourceCounts = {};
    allItems.forEach(function (item) {
      var s = item.source || "未知";
      getSourceColorIndex(s);
      sourceCounts[s] = (sourceCounts[s] || 0) + 1;
    });

    sourceList = Object.keys(sourceCounts).map(function (name) {
      return { name: name, count: sourceCounts[name] };
    }).sort(function (a, b) { return b.count - a.count; });

    // All sources selected by default
    sourceList.forEach(function (s) {
      selectedSources[s.name] = true;
    });

    updateHeroStats();
    buildSourceTabs();
    buildSourcePanel();
    applyFilters();
    restoreHashState();
  }

  /* ---- Hero / header stats ---- */
  function updateHeroStats() {
    $heroTime.textContent = "最后更新：" + (updatedAt || "未知");
    $heroTotal.textContent = "共收录 " + allItems.length + " 条";
    $headerCount.textContent = allItems.length + " 条";
  }

  /* ---- Source Tabs Bar ---- */
  function buildSourceTabs() {
    // Only show sources that are selected in the gear panel
    var visibleSources = sourceList.filter(function (s) {
      return selectedSources[s.name] !== false;
    });

    var html = '<div class="source-tab' + (activeSourceTab === "all" ? " active" : "") + '" data-tab="all">全部<span class="tab-count">' + allItems.length + '</span></div>';
    visibleSources.forEach(function (s) {
      html += '<div class="source-tab' + (activeSourceTab === s.name ? " active" : "") + '" data-tab="' + escapeHtml(s.name) + '">' + escapeHtml(s.name) + '<span class="tab-count">' + s.count + '</span></div>';
    });
    $sourceTabs.innerHTML = html;

    // Attach click events
    var tabs = $sourceTabs.querySelectorAll(".source-tab");
    tabs.forEach(function (tab) {
      tab.addEventListener("click", function () {
        activeSourceTab = this.getAttribute("data-tab");
        // Update active class
        tabs.forEach(function (t) { t.classList.remove("active"); });
        this.classList.add("active");
        applyFilters();
      });
    });
  }

  /* ---- Source Filter Panel ---- */
  function buildSourcePanel() {
    var html = "";
    sourceList.forEach(function (s) {
      var srcIdx = getSourceColorIndex(s.name);
      var checked = selectedSources[s.name] !== false ? " checked" : "";
      html += '<label class="source-check">';
      html += '<input type="checkbox" data-source="' + escapeHtml(s.name) + '"' + checked + '>';
      html += '<span class="source-check-name">' + escapeHtml(s.name) + '</span>';
      html += '<span class="source-check-count">' + s.count + '</span>';
      html += '</label>';
    });
    $sourceGrid.innerHTML = html;
    updateSourcePanelCount();

    // Attach change events
    var checkboxes = $sourceGrid.querySelectorAll('input[type="checkbox"]');
    checkboxes.forEach(function (cb) {
      cb.addEventListener("change", function () {
        selectedSources[this.getAttribute("data-source")] = this.checked;
        updateSourcePanelCount();
        buildSourceTabs();
        applyFilters();
      });
    });
  }

  function updateSourcePanelCount() {
    var total = sourceList.length;
    var selected = 0;
    sourceList.forEach(function (s) {
      if (selectedSources[s.name] !== false) selected++;
    });
    $sourcePanelCnt.textContent = "已选择 " + selected + " / " + total + " 个来源";
  }

  // Select All
  document.getElementById("btnSelectAll").addEventListener("click", function () {
    sourceList.forEach(function (s) { selectedSources[s.name] = true; });
    var checkboxes = $sourceGrid.querySelectorAll('input[type="checkbox"]');
    checkboxes.forEach(function (cb) { cb.checked = true; });
    updateSourcePanelCount();
    buildSourceTabs();
    applyFilters();
  });

  // Deselect All
  document.getElementById("btnDeselectAll").addEventListener("click", function () {
    sourceList.forEach(function (s) { selectedSources[s.name] = false; });
    var checkboxes = $sourceGrid.querySelectorAll('input[type="checkbox"]');
    checkboxes.forEach(function (cb) { cb.checked = false; });
    updateSourcePanelCount();
    buildSourceTabs();
    applyFilters();
  });

  /* ---- Toggle panels ---- */
  $btnSearch.addEventListener("click", function () {
    var isOpen = $searchPanel.classList.contains("open");
    // Close source panel if open
    $sourcePanel.classList.remove("open");
    $btnSourceFilter.classList.remove("active");

    if (isOpen) {
      $searchPanel.classList.remove("open");
      this.classList.remove("active");
    } else {
      $searchPanel.classList.add("open");
      this.classList.add("active");
      setTimeout(function () { $searchInput.focus(); }, 350);
    }
  });

  $btnSourceFilter.addEventListener("click", function () {
    var isOpen = $sourcePanel.classList.contains("open");
    // Close search panel if open
    $searchPanel.classList.remove("open");
    $btnSearch.classList.remove("active");

    if (isOpen) {
      $sourcePanel.classList.remove("open");
      this.classList.remove("active");
    } else {
      $sourcePanel.classList.add("open");
      this.classList.add("active");
    }
  });

  /* ---- Filtering + Search ---- */
  function applyFilters() {
    var query = searchQuery.toLowerCase().trim();

    filteredItems = allItems.filter(function (item) {
      // Source filter (gear panel)
      var src = item.source || "未知";
      if (selectedSources[src] === false) return false;

      // Source tab filter
      if (activeSourceTab !== "all" && src !== activeSourceTab) return false;

      // Search filter
      if (query) {
        var text = (item.text || "").toLowerCase();
        var source = (item.source || "").toLowerCase();
        if (text.indexOf(query) === -1 && source.indexOf(query) === -1) return false;
      }

      return true;
    });

    displayedCount = 0;
    expandedCardId = null;
    renderItems();
    updateSearchResultCount();
  }

  function updateSearchResultCount() {
    if (searchQuery) {
      $searchResultCnt.textContent = "找到 " + filteredItems.length + " 条结果";
    } else {
      $searchResultCnt.textContent = "";
    }
  }

  /* ---- Search ---- */
  var debouncedSearch = debounce(function () {
    searchQuery = $searchInput.value.trim();
    $searchClear.classList.toggle("visible", searchQuery.length > 0);
    saveHashState();
    applyFilters();
  }, DEBOUNCE_MS);

  $searchInput.addEventListener("input", debouncedSearch);

  $searchClear.addEventListener("click", function () {
    $searchInput.value = "";
    searchQuery = "";
    $searchClear.classList.remove("visible");
    saveHashState();
    applyFilters();
    $searchInput.focus();
  });

  /* ---- Rendering ---- */
  function renderItems() {
    var total = filteredItems.length;
    var toShow = Math.min(displayedCount + PAGE_SIZE, total);

    var html = "";

    // Status bar
    html += '<div class="status-bar">';
    if (searchQuery) {
      html += '<span class="search-result-info">搜索 "' + escapeHtml(searchQuery) + '" 找到 ' + total + " 条结果</span>";
    } else {
      html += "<span>共 " + total + " 条线报</span>";
    }
    html += '<span id="displayCounter">显示 ' + (total > 0 ? toShow : 0) + " / " + total + " 条</span>";
    html += "</div>";

    if (total === 0) {
      html += '<div class="empty-state">';
      html += '<div class="empty-icon">&#x1F50D;</div>';
      html += '<div class="empty-title">没有找到相关线报</div>';
      html += '<div class="empty-desc">试试其他关键词、切换来源筛选或清除搜索</div>';
      html += "</div>";
    } else {
      html += '<div class="item-list" id="itemList">';
      for (var i = 0; i < toShow; i++) {
        html += renderItemCard(filteredItems[i], i);
      }
      html += "</div>";

      // Load more
      if (toShow < total) {
        html += '<div class="load-more-wrap">';
        html += '<button class="btn-load-more" id="btnLoadMore">加载更多 (' + (total - toShow) + " 条)</button>";
        html += "</div>";
        html += '<div class="scroll-sentinel" id="scrollSentinel"></div>';
      }
    }

    $mainContent.innerHTML = html;
    displayedCount = toShow;

    // Rebind load more
    var $btn = document.getElementById("btnLoadMore");
    if ($btn) {
      $btn.addEventListener("click", function () { loadMore(); });
    }

    // Bind card click events
    bindCardEvents();

    // Setup intersection observer
    setupInfiniteScroll();
  }

  function renderItemCard(item, idx) {
    var src = item.source || "未知";
    var srcIdx = getSourceColorIndex(src);
    var time = formatRelativeTime(item.time);
    var timeRaw = item.time || "";
    var url = item.url || "#";
    var domain = extractDomain(url);
    var delay = Math.min(idx, 10) * 0.03;
    var isExpanded = expandedCardId === idx;
    var cardClass = "item-card" + (isExpanded ? " expanded" : "");

    // Highlighted title
    var titleHighlighted = highlightPrices(item.text || "无线报标题");

    var s = "";
    s += '<div class="' + cardClass + '" data-idx="' + idx + '" style="animation-delay:' + delay.toFixed(2) + 's">';
    s += '<div class="item-dot dot-color-' + srcIdx + '"></div>';
    s += '<div class="item-body">';
    s += '<div class="item-title">' + titleHighlighted + '</div>';

    // Expandable detail section
    s += '<div class="item-detail">';
    s += '<div class="item-detail-inner">';
    s += '<div class="item-detail-row"><span class="item-detail-label">来源：</span><span class="item-detail-value">' + escapeHtml(src) + '</span></div>';
    if (domain) {
      s += '<div class="item-detail-row"><span class="item-detail-label">域名：</span><span class="item-detail-value">' + escapeHtml(domain) + '</span></div>';
    }
    s += '<div class="item-detail-row"><span class="item-detail-label">时间：</span><span class="item-detail-value">' + escapeHtml(timeRaw) + '</span></div>';
    s += '<a href="' + escapeHtml(url) + '" target="_blank" rel="noopener" class="btn-go" onclick="event.stopPropagation();">前往查看 &rarr;</a>';
    s += '</div>';
    s += '</div>';

    s += '</div>';
    s += '<div class="item-meta">';
    s += '<span class="item-source src-color-' + srcIdx + '">' + escapeHtml(src) + '</span>';
    s += '<span class="item-time" title="' + escapeHtml(timeRaw) + '">' + escapeHtml(time) + '</span>';
    s += '</div>';
    s += '</div>';
    return s;
  }

  function bindCardEvents() {
    var cards = document.querySelectorAll(".item-card");
    cards.forEach(function (card) {
      card.addEventListener("click", function (e) {
        // Don't toggle if user clicked a link inside
        if (e.target.closest("a")) return;
        var idx = parseInt(this.getAttribute("data-idx"), 10);
        toggleCard(idx);
      });
    });
  }

  function toggleCard(idx) {
    var cards = document.querySelectorAll(".item-card");
    cards.forEach(function (card) {
      var cardIdx = parseInt(card.getAttribute("data-idx"), 10);
      if (cardIdx === idx) {
        card.classList.toggle("expanded");
        if (card.classList.contains("expanded")) {
          expandedCardId = idx;
        } else {
          expandedCardId = null;
        }
      } else {
        card.classList.remove("expanded");
      }
    });
  }

  function loadMore() {
    var total = filteredItems.length;
    if (displayedCount >= total) return;

    var toShow = Math.min(displayedCount + PAGE_SIZE, total);
    var $list = document.getElementById("itemList");
    if (!$list) return;

    var fragment = "";
    for (var i = displayedCount; i < toShow; i++) {
      fragment += renderItemCard(filteredItems[i], i);
    }
    $list.insertAdjacentHTML("beforeend", fragment);
    displayedCount = toShow;

    // Update counter
    var $counter = document.getElementById("displayCounter");
    if ($counter) $counter.textContent = "显示 " + toShow + " / " + total + " 条";

    // Update/remove load-more button
    var $btnWrap = document.querySelector(".load-more-wrap");
    if (toShow >= total && $btnWrap) {
      $btnWrap.remove();
    } else if ($btnWrap) {
      var $btn = $btnWrap.querySelector(".btn-load-more");
      if ($btn) $btn.textContent = "加载更多 (" + (total - toShow) + " 条)";
    }

    // Rebind card events for new cards
    bindCardEvents();
    setupInfiniteScroll();
  }

  /* ---- Infinite Scroll ---- */
  var observer = null;

  function setupInfiniteScroll() {
    if (observer) observer.disconnect();

    var sentinel = document.getElementById("scrollSentinel");
    if (!sentinel) return;

    observer = new IntersectionObserver(function (entries) {
      if (entries[0].isIntersecting) {
        loadMore();
      }
    }, { rootMargin: "200px" });

    observer.observe(sentinel);
  }

  /* ---- UI states ---- */
  function showLoading() {
    $mainContent.innerHTML = '<div class="loading"><div class="spinner"></div><div class="loading-text">正在加载线报数据...</div></div>';
  }

  function showError(msg) {
    $mainContent.innerHTML =
      '<div class="error-state">' +
      '<div class="error-icon">&#x26A0;&#xFE0F;</div>' +
      '<div class="error-title">数据加载失败</div>' +
      '<div class="error-desc">' + escapeHtml(msg) + ' - 请确保 items.json 文件存在且格式正确</div>' +
      '<button class="btn-retry" id="btnRetry">重新加载</button>' +
      '</div>';
    var $retry = document.getElementById("btnRetry");
    if ($retry) {
      $retry.addEventListener("click", function () { fetchData(); });
    }
  }

  /* ---- Back to Top ---- */
  window.addEventListener("scroll", function () {
    $backToTop.classList.toggle("visible", window.scrollY > 400);
  }, { passive: true });

  $backToTop.addEventListener("click", function () {
    window.scrollTo({ top: 0, behavior: "smooth" });
  });

  /* ---- URL Hash State ---- */
  function saveHashState() {
    var hash = "";
    if (searchQuery) hash = "q=" + encodeURIComponent(searchQuery);
    history.replaceState(null, "", hash ? "#" + hash : window.location.pathname);
  }

  function restoreHashState() {
    var hash = window.location.hash.slice(1);
    if (!hash) return;
    var params = {};
    hash.split("&").forEach(function (part) {
      var kv = part.split("=");
      if (kv.length === 2) params[kv[0]] = decodeURIComponent(kv[1]);
    });
    if (params.q) {
      // Open the search panel and set query
      $searchPanel.classList.add("open");
      $btnSearch.classList.add("active");
      $searchInput.value = params.q;
      searchQuery = params.q;
      $searchClear.classList.add("visible");
      applyFilters();
    }
  }

  /* ---- Keyboard shortcuts ---- */
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") {
      if ($searchPanel.classList.contains("open")) {
        $searchPanel.classList.remove("open");
        $btnSearch.classList.remove("active");
      }
      if ($sourcePanel.classList.contains("open")) {
        $sourcePanel.classList.remove("open");
        $btnSourceFilter.classList.remove("active");
      }
    }
  });

  /* ---- PWA: Service Worker Registration ---- */
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
  }

  /* ---- Start ---- */
  fetchData();

})();
</script>
</body>
</html>
