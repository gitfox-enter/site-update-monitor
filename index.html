<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#1976d2;
  --primary-hover:#1565c0;
  --bg:#fff;
  --bg-alt:#f7f8fa;
  --text:#333;
  --text-sec:#666;
  --text-muted:#999;
  --border:#e8e8e8;
  --border-light:#f0f0f0;
  --sidebar-w:200px;
  --header-h:52px;
  --radius:6px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06);
  --font: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
}
/* Dark mode */
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1a1a2e;
    --bg-alt:#16213e;
    --text:#e0e0e0;
    --text-sec:#aaa;
    --text-muted:#777;
    --border:#2a2a4a;
    --border-light:#222244;
    --shadow-sm:0 1px 3px rgba(0,0,0,.3);
  }
  #header,#sidebar,#content,#footer,#cat-dropdown,#cat-toggle-bar,#pagination,.page-btn,.item>a,#page-select{background:var(--bg)}
  .item>a:hover{background:#1e1e3a}
  #search-input{background:var(--bg);color:var(--text);border-color:var(--border)}
  .cat-item.active{background:#1a237e33}
  .src-badge{opacity:.9}
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
body{font-family:var(--font);background:var(--bg-alt);color:var(--text);min-height:100vh;line-height:1.5;-webkit-font-smoothing:antialiased;padding-bottom:env(safe-area-inset-bottom)}
a{color:inherit;text-decoration:none}
button{font-family:inherit;border:none;background:none;cursor:pointer;padding:0;margin:0;font-size:inherit;color:inherit;touch-action:manipulation}
a{touch-action:manipulation}
/* Skip link for accessibility */
#skip-link{position:absolute;top:-100%;left:16px;z-index:9999;padding:8px 16px;background:var(--primary);color:#fff;border-radius:0 0 var(--radius) var(--radius);font-size:14px;font-weight:600;text-decoration:none;transition:top .2s}
#skip-link:focus{top:0}
/* Visually hidden but accessible */
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
/* Focus styles for accessibility */
button:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid var(--primary);outline-offset:2px}

/* ========== HEADER ========== */
#header{
  background:#fff;
  height:var(--header-h);
  display:flex;
  align-items:center;
  padding:0 16px;
  position:sticky;
  top:0;
  z-index:100;
  border-bottom:1px solid var(--border);
  gap:12px;
}
#icon-menu{display:none;font-size:20px;cursor:pointer;color:var(--text);padding:4px 8px;border-radius:4px;flex-shrink:0}
#icon-menu:hover{background:var(--bg-alt)}
#logo{
  font-size:18px;
  font-weight:700;
  color:var(--primary);
  white-space:nowrap;
  flex-shrink:0;
  letter-spacing:-0.5px;
  margin:0;
  line-height:1;
}
.header-divider{width:1px;height:24px;background:var(--border);flex-shrink:0}
#search-form{
  display:flex;
  align-items:center;
  flex:1;
  max-width:360px;
  height:34px;
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  background:#fff;
  transition:border-color .2s;
}
#search-form:focus-within{border-color:var(--primary)}
#search-form svg{width:16px;height:16px;margin-left:10px;color:var(--text-muted);flex-shrink:0}
#search-input{
  border:none;
  outline:none;
  flex:1;
  height:100%;
  padding:0 8px;
  font-size:13px;
  font-family:inherit;
  background:transparent;
  color:var(--text);
}
#search-input::placeholder{color:var(--text-muted)}
#search-btn{
  background:var(--primary);
  color:#fff;
  border:none;
  height:100%;
  padding:0 14px;
  font-size:13px;
  cursor:pointer;
  white-space:nowrap;
  transition:background .2s;
}
#search-btn:hover{background:var(--primary-hover)}
#menu{display:flex;align-items:center;gap:2px;flex-shrink:0}
#menu button{
  padding:6px 14px;
  font-size:14px;
  color:var(--text-sec);
  border-radius:var(--radius);
  cursor:pointer;
  transition:all .15s;
  white-space:nowrap;
}
#menu button:hover{color:var(--primary);background:#e3f2fd}
#menu button.active{color:var(--primary);font-weight:600;background:#e3f2fd}
#icon-search-mobile{display:none;font-size:18px;cursor:pointer;color:var(--text);padding:4px 8px}

/* ========== MAIN LAYOUT ========== */
#app{
  display:flex;
  max-width:1200px;
  margin:0 auto;
  min-height:calc(100vh - var(--header-h));
}

/* ========== SIDEBAR ========== */
#sidebar{
  width:var(--sidebar-w);
  flex-shrink:0;
  background:#fff;
  border-right:1px solid var(--border);
  overflow-y:auto;
  position:sticky;
  top:var(--header-h);
  height:calc(100vh - var(--header-h));
}
#sidebar::-webkit-scrollbar{width:4px}
#sidebar::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
.cat-section{padding:8px 0}
.cat-item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  width:100%;
  padding:9px 16px;
  font-size:13px;
  color:var(--text-sec);
  cursor:pointer;
  transition:all .15s;
  border-left:3px solid transparent;
  text-align:left;
}
.cat-item:hover{background:var(--bg-alt);color:var(--text)}
.cat-item.active{
  color:var(--primary);
  font-weight:600;
  background:#e3f2fd;
  border-left-color:var(--primary);
}
.cat-item .cat-name{
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  flex:1;
}
.cat-item .cat-count{
  font-size:11px;
  color:var(--text-muted);
  background:var(--bg-alt);
  padding:1px 6px;
  border-radius:10px;
  flex-shrink:0;
  margin-left:6px;
  min-width:20px;
  text-align:center;
}
.cat-item.active .cat-count{background:#bbdefb;color:var(--primary)}
.sidebar-divider{height:1px;background:var(--border-light);margin:4px 16px}

/* ========== CONTENT AREA ========== */
#content{
  flex:1;
  min-width:0;
  display:flex;
  flex-direction:column;
}

/* -- Status bar -- */
#status-bar{
  padding:10px 16px;
  font-size:12px;
  color:var(--text-muted);
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#fff;
  border-bottom:1px solid var(--border-light);
}
#status-bar .highlight{color:var(--primary);font-weight:500}

/* ========== ITEM LIST ========== */
.list-wrap{background:#fff;flex:1}
.list-empty{
  padding:60px 20px;
  text-align:center;
  color:var(--text-muted);
  font-size:14px;
}
.list-empty .empty-icon{font-size:40px;margin-bottom:12px;display:block;opacity:.5}
.list-empty .empty-hint{font-size:13px;margin-top:8px;color:var(--text-muted);opacity:.7}
.list-empty .empty-action{display:inline-block;margin-top:12px;padding:6px 18px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;color:var(--text-sec);cursor:pointer;transition:all .15s}
.list-empty .empty-action:hover{border-color:var(--primary);color:var(--primary)}
#last-update{font-size:11px;color:var(--text-muted);margin-left:8px;opacity:.7}
.kbd-hint{position:fixed;bottom:24px;left:24px;font-size:11px;color:var(--text-muted);opacity:0;transition:opacity .3s;pointer-events:none;z-index:50}
.kbd-hint.show{opacity:.6}
.kbd-hint kbd{display:inline-block;padding:1px 6px;background:var(--bg);border:1px solid var(--border);border-radius:3px;font-family:inherit;font-size:10px;margin:0 2px}
/* PWA Install Banner */
#install-banner{position:fixed;bottom:0;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:10px;padding:10px 16px;background:var(--primary);color:#fff;font-size:13px;z-index:200;animation:slideUp .3s ease}
#install-banner button{padding:4px 14px;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer}
#install-banner button[aria-label*="确认"]{background:#fff;color:var(--primary)}
#install-banner button[aria-label*="关闭"]{background:transparent;color:rgba(255,255,255,.7);font-size:16px;padding:4px 8px}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.item{
  border-bottom:1px solid var(--border-light);
  transition:background .1s;
}
.item:hover{background:#fafbfc}
.item>a{
  display:flex;
  align-items:center;
  padding:11px 16px;
  gap:10px;
  color:var(--text);
  transition:color .15s;
}
.item>a:hover .item-title{color:var(--primary)}
.src-badge{
  min-width:28px;
  width:28px;
  height:28px;
  border-radius:4px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  color:#fff !important;
  font-size:14px;
  font-weight:700;
  font-family:var(--font);
  flex-shrink:0;
  line-height:1;
  text-align:center;
  user-select:none;
}
.item-body{flex:1;min-width:0}
.item-title{
  font-size:14px;
  font-weight:400;
  color:var(--text);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  line-height:1.5;
  transition:color .15s;
}
.item-meta{
  display:flex;
  align-items:center;
  gap:12px;
  margin-top:2px;
  font-size:12px;
  color:var(--text-muted);
}
.item-meta svg{width:12px;height:12px;vertical-align:-1px;margin-right:2px}
.platform-tag{
  font-size:11px;
  color:var(--primary);
  border:1px solid #bbdefb;
  border-radius:3px;
  padding:0 5px;
  line-height:1.6;
  background:#e3f2fd;
}
.price-hl{color:#e53935;font-weight:600}

/* ========== PAGINATION ========== */
#pagination{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  padding:16px;
  background:#fff;
  border-top:1px solid var(--border-light);
}
.page-btn{
  padding:6px 16px;
  font-size:13px;
  color:var(--text-sec);
  background:#fff;
  border:1px solid var(--border);
  border-radius:var(--radius);
  cursor:pointer;
  transition:all .15s;
}
.page-btn:hover{border-color:var(--primary);color:var(--primary)}
.page-btn.disabled{opacity:.4;pointer-events:none}
#page-select{
  padding:6px 8px;
  font-size:13px;
  border:1px solid var(--border);
  border-radius:var(--radius);
  background:#fff;
  color:var(--text);
  min-width:80px;
}

/* ========== FOOTER ========== */
#footer{
  text-align:center;
  padding:20px 16px;
  font-size:12px;
  color:var(--text-muted);
  background:var(--bg-alt);
}
#footer a{color:var(--text-muted);margin:0 6px}
#footer a:hover{color:var(--primary)}

/* ========== MOBILE DROPDOWN (category) ========== */
#cat-dropdown{
  display:none;
  background:#fff;
  border-bottom:1px solid var(--border);
  max-height:0;
  overflow:hidden;
  transition:max-height .3s ease;
  position:sticky;
  top:var(--header-h);
  z-index:90;
}
#cat-dropdown.open{max-height:320px;overflow-y:auto}
#cat-dropdown .cat-item{padding:10px 20px;border-left:none}
#cat-dropdown .cat-item.active{background:#e3f2fd;border-left:none}
#cat-toggle-bar{
  display:none;
  background:#fff;
  padding:8px 16px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  font-size:13px;
  color:var(--text-sec);
  position:sticky;
  top:var(--header-h);
  z-index:91;
}
#cat-toggle-bar:hover{background:var(--bg-alt)}
#cat-toggle-bar .toggle-arrow{
  display:inline-block;
  transition:transform .2s;
  margin-right:6px;
  font-size:10px;
}
#cat-toggle-bar.open .toggle-arrow{transform:rotate(90deg)}

/* ========== BACK TO TOP ========== */
#back-top{
  position:fixed;
  bottom:24px;
  right:24px;
  width:40px;
  height:40px;
  border-radius:50%;
  background:#fff;
  border:1px solid var(--border);
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:all .2s;
  z-index:50;
}
#back-top.show{opacity:1;pointer-events:auto}
#back-top:hover{border-color:var(--primary);color:var(--primary)}
#back-top svg{width:18px;height:18px}

/* ========== LOADING ========== */
.loading{
  padding:40px 20px;
  text-align:center;
  color:var(--text-muted);
  font-size:14px;
}
.loading::before{
  content:"";
  display:inline-block;
  width:20px;
  height:20px;
  border:2px solid var(--border);
  border-top-color:var(--primary);
  border-radius:50%;
  animation:spin .6s linear infinite;
  margin-right:8px;
  vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ========== SKELETON LOADING ========== */
.skeleton-item{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border-light);animation:pulse 1.5s ease-in-out infinite}
.skeleton-badge{width:28px;height:28px;border-radius:4px;background:var(--border);flex-shrink:0}
.skeleton-body{flex:1;min-width:0}
.skeleton-line{height:14px;border-radius:3px;background:var(--border);margin-bottom:6px}
.skeleton-line.w60{width:60%}
.skeleton-line.w80{width:80%}
.skeleton-line.w40{width:40%}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ========== RESPONSIVE ========== */
@media(max-width:960px){
  #sidebar{display:none}
  #icon-menu{display:block}
  #cat-toggle-bar{display:flex;align-items:center}
  #cat-dropdown{display:block}
  #menu button.hide-mobile{display:none}
  #view-bar{display:flex}
  #search-form{max-width:none}
  .header-divider{display:none}
  #app{flex-direction:column}
}
@media(max-width:600px){
  #header{padding:0 10px;gap:8px}
  #logo{font-size:16px}
  #search-form{height:32px}
  #search-btn{padding:0 10px;font-size:12px}
  #menu button{padding:6px 8px;font-size:13px}
  .item>a{padding:10px 12px;gap:8px}
  .item-title{font-size:13px}
  .src-badge{min-width:24px;width:24px;height:24px;font-size:12px}
  #footer{padding:16px 12px}
  #back-top{bottom:16px;right:16px;width:36px;height:36px}
}
</style>
</head>

<a id="skip-link" href="#content">跳转到主要内容</a>

<!-- ===== HEADER ===== -->

<!-- ===== MOBILE CATEGORY TOGGLE ===== -->
<button id="cat-toggle-bar" onclick="toggleCatDropdown()" aria-label="展开来源分类" aria-expanded="false">

  <!-- Content -->

          <div class="skeleton-item"><div class="skeleton-badge"></div><div class="skeleton-body"><div class="skeleton-line w80"></div><div class="skeleton-line w40"></div></div></div>
          <div class="skeleton-item"><div class="skeleton-badge"></div><div class="skeleton-body"><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div></div></div>
          <div class="skeleton-item"><div class="skeleton-badge"></div><div class="skeleton-body"><div class="skeleton-line w80"></div><div class="skeleton-line w40"></div></div></div>
          <div class="skeleton-item"><div class="skeleton-badge"></div><div class="skeleton-body"><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div></div></div>
          <div class="skeleton-item"><div class="skeleton-badge"></div><div class="skeleton-body"><div class="skeleton-line w80"></div><div class="skeleton-line w40"></div></div></div>
        </span>
        <span id="last-update"></span>
      </div>
      <div class="list-wrap" id="item-list" role="list" aria-label="线报条目列表"></div>
      <nav id="pagination" role="navigation" aria-label="分页导航"></nav>
    </section>

    

  </main>
</div>

<!-- ===== FOOTER ===== -->
<footer id="footer" role="contentinfo">
  <p>&copy; 2024-2026 线报聚合 All Right Reserved</p>
  <p style="margin-top:4px">
    <a href="https://github.com/gitfox-enter/site-update-monitor" target="_blank" rel="noopener noreferrer">GitHub</a>
  </p>
</footer>

  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><polyline points="18 15 12 9 6 15"/></svg>
</button>

<!-- Keyboard hints (desktop only) -->
<div class="kbd-hint" id="kbd-hint" aria-hidden="true">
  按 <kbd>/</kbd> 搜索 · <kbd>Esc</kbd> 关闭
</div>

<script>
/* Frame-busting for clickjacking protection */
if(window.top!==window.self){try{window.top.location=window.location}catch(e){document.body.style.display='none'}}

/* ================================================================
   DATA & STATE
   ================================================================ */
var allItems = [];
var sources = [];       // [{name, count, color}]
var activeSource = 'all';
var searchQuery = '';
var currentPage = 1;
var PAGE_SIZE = 40;
var currentView = 'list';
/* Source name normalization map */
var SOURCE_MAP = {
  '线报酷 - 专注线报活动与优惠促销分享的线报网站': '线报酷',
  '好赚网 - 每日分享新鲜活动线报和优惠信息': '好赚网',
  '0818团线报资源网-京东优惠券/抽奖-为赚客服务的一手线报网站-0818线报': '0818团',
  '拔草哦 | 折扣信息分享网站_推荐海淘折扣信息_转运攻略，告诉你什么值得买': '拔草哦',
  '聚合线报 - 实时优惠线报 | 薅羊毛 | 赚客吧 | 好单精选': '聚合线报',
  '鲸线报 - 专业实时搜集与分享全网优惠线报和促销活动的平台': '鲸线报',
  '超级线报 - 实时监控 / AI驱动 / 体验超好的线报网站！': '超级线报',
  '白菜哦-高性价比网购海淘推荐': '白菜哦'
};

/* Source badge colors */
var SRC_COLORS = {
  '爱Q生活':   '#43a047',
  '赚客吧':   '#e53935',
  '线报酷':   '#1e88e5',
  '好赚网':   '#8e24aa',
  '汇发部':   '#00897b',
  '聚合线报':  '#f4511e',
  '拔草哦':   '#d81b60',
  '新赚吧':   '#6d4c41',
  '0818团':   '#546e7a',
  '鲸线报':   '#039be5',
  '专业线报':  '#7cb342',
  '超级线报':  '#fb8c00',
  '线报ICU':  '#5e35b1',
  '白菜哦':   '#00acc1',
  '促销吧':   '#c0ca33',
  '好赚线报':  '#ab47bc',
  '79淘':     '#ff7043',
  '907线报':  '#26a69a',
  '天天赚':   '#ff8a65',
  '慢慢买':   '#42a5f5',
  '小众软件':  '#66bb6a',
  'IT之家':   '#ef5350',
  '开心赚':   '#ffa726',
  '羊毛党':   '#ab47bc',
  '线报迷':   '#29b6f6',
  '羊毛王':   '#ff5722',
  '资源厅':   '#5c6bc0',
  '51卡农':   '#8d6e63',
  '线报网':   '#26c6da',
  '小嘀咕':   '#ec407a',
  '豆瓣小组':  '#66bb6a',
  '好单库':   '#26a69a',
  '免费族':   '#78909c',
  '网赚':     '#7e57c2',
  '优惠线报':  '#ff7043',
  '活动5':    '#42a5f5',
  '线报迷':   '#29b6f6'
};
var DEFAULT_COLOR = '#78909c';

function normalizeSource(raw) {
  if (!raw) return '未知来源';
  var mapped = SOURCE_MAP[raw];
  return mapped || raw;
}

function getSourceColor(name) {
  return SRC_COLORS[name] || DEFAULT_COLOR;
}

function getSourceChar(name) {
  if (!name) return '?';
  return name.charAt(0);
}

/* ================================================================
   PLATFORM DETECTION
   ================================================================ */
var PLATFORM_RULES = [
  {name: '京东', kw: ['京东','jd.com','jd','京豆','京享','百亿补贴','PLUS']},
  {name: '淘宝', kw: ['淘宝','天猫','tmall','taobao','淘金币']},
  {name: '拼多多', kw: ['拼多多','pdd','拼多','拼夕夕']},
  {name: '抖音', kw: ['抖音','douyin','tiktok']},
  {name: '外卖', kw: ['外卖','美团','饿了么']},
  {name: '唯品会', kw: ['唯品会','vip.com']},
  {name: '苏宁', kw: ['苏宁','suning']}
];

function detectPlatform(item) {
  var text = (item.text || '') + ' ' + (item.url || '');
  for (var i = 0; i < PLATFORM_RULES.length; i++) {
    var r = PLATFORM_RULES[i];
    for (var j = 0; j < r.kw.length; j++) {
      if (text.indexOf(r.kw[j]) !== -1) return r.name;
    }
  }
  return null;
}

/* ================================================================
   PRICE HIGHLIGHTING
   ================================================================ */
var PRICE_RE = /((?:到手|约|仅需|券后|实付|折合|折后|大概)?[¥￥]?\d+(?:\.\d+)?(?:元|块|亓|￥)?)/g;
function highlightPrice(text) {
  return text.replace(PRICE_RE, '<span class="price-hl">$1</span>');
}

/* ================================================================
   TIME FORMATTING
   ================================================================ */
function formatTime(t) {
  if (!t) return '';
  return t.replace(/^\d{4}-/, '').replace(/:\d{2}$/, '');
}

/* ================================================================
   TITLE CLEANUP - strip leading date/time prefixes
   ================================================================ */
function cleanTitle(text) {
  if (!text) return '';
  // Strip leading "MM-DD HH:MM" pattern (e.g., "06-07 20:08伊利...")
  text = text.replace(/^\d{2}[-/]\d{2}\s+\d{2}:\d{2}\s*/, '');
  // Also strip "MM-DD" at start if followed by Chinese text
  text = text.replace(/^\d{2}[-/]\d{2}\s+/, '');
  return text.trim();
}

/* ================================================================
   DATA LOADING
   ================================================================ */
function loadData() {
  document.getElementById('item-list').innerHTML = '<div class="loading">加载中</div>';

  fetch('items.json?t=' + Date.now(), { priority: 'high' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var rawItems = data.items || [];
      /* Capture last update time */
      var lastUpdate = data.updated_at || data.last_updated || '';
      if (!lastUpdate && rawItems.length > 0) {
        /* Fallback: use the most recent item time */
        var latest = '';
        for (var i = 0; i < Math.min(rawItems.length, 50); i++) {
          if (rawItems[i].time && rawItems[i].time > latest) latest = rawItems[i].time;
        }
        lastUpdate = latest;
      }
      if (lastUpdate) {
        var el = document.getElementById('last-update');
        if (el) el.textContent = '更新于 ' + lastUpdate.replace(' ', ' ').slice(5, 16);
      }
      /* Normalize sources & detect platform */
      allItems = rawItems.map(function(it) {
        return {
          url: it.url || '',
          text: (it.text || '').trim(),
          source: normalizeSource(it.source),
          rawSource: it.source || '',
          time: it.time || '',
          category: it.category || null,
          platform: detectPlatform(it)
        };
      });

      /* Build source stats */
      var srcMap = {};
      allItems.forEach(function(it) {
        srcMap[it.source] = (srcMap[it.source] || 0) + 1;
      });
      sources = Object.keys(srcMap).map(function(name) {
        return { name: name, count: srcMap[name], color: getSourceColor(name) };
      }).sort(function(a, b) { return b.count - a.count; });

      buildSidebar();
      buildMobileDropdown();
      renderAll();
      updateStatus();
    })
    .catch(function(err) {
      document.getElementById('item-list').innerHTML =
        '<div class="list-empty">加载失败，请刷新重试<br><small>' + err.message + '</small></div>';
    });
}

/* ================================================================
   SIDEBAR
   ================================================================ */
function buildSidebar() {
  var container = document.getElementById('sidebar-cats');
  var html = '<button class="cat-item' + (activeSource === 'all' ? ' active' : '') + '" data-src="all" onclick="selectSource(\'all\')" aria-label="筛选来源: 全部线报" aria-pressed="' + (activeSource === 'all') + '">' +
    '<span class="cat-name">全部线报</span>' +
    '<span class="cat-count">' + allItems.length + '</span></button>';

  sources.forEach(function(s) {
    var isActive = activeSource === s.name;
    html += '<button class="cat-item' + (isActive ? ' active' : '') + '" data-src="' + escAttr(s.name) + '" onclick="selectSource(\'' + escAttr(s.name) + '\')" aria-label="筛选来源: ' + escAttr(s.name) + '" aria-pressed="' + isActive + '">' +
      '<span class="cat-name">' + esc(s.name) + '</span>' +
      '<span class="cat-count">' + s.count + '</span></button>';
  });

  container.innerHTML = html;
}

function buildMobileDropdown() {
  var container = document.getElementById('cat-dropdown');
  var html = '<button class="cat-item' + (activeSource === 'all' ? ' active' : '') + '" onclick="selectSource(\'all\');closeCatDropdown()" role="option" aria-selected="' + (activeSource === 'all') + '">' +
    '<span class="cat-name">全部线报</span>' +
    '<span class="cat-count">' + allItems.length + '</span></button>';

  sources.forEach(function(s) {
    var isActive = activeSource === s.name;
    html += '<button class="cat-item' + (isActive ? ' active' : '') + '" onclick="selectSource(\'' + escAttr(s.name) + '\');closeCatDropdown()" role="option" aria-selected="' + isActive + '">' +
      '<span class="cat-name">' + esc(s.name) + '</span>' +
      '<span class="cat-count">' + s.count + '</span></button>';
  });

  container.innerHTML = html;
}

function selectSource(name) {
  activeSource = name;
  currentPage = 1;
  buildSidebar();
  buildMobileDropdown();
  renderList();
  updateStatus();
  /* Update toggle bar text */
  var toggleText = document.getElementById('cat-toggle-text');
  toggleText.textContent = name === 'all' ? '全部线报' : name;
  /* Scroll to top of list */
  window.scrollTo({top: 0, behavior: 'smooth'});
}

/* ================================================================
   FILTERING
   ================================================================ */
function getFiltered() {
  var filtered = allItems;

  /* Source filter */
  if (activeSource !== 'all') {
    filtered = filtered.filter(function(it) { return it.source === activeSource; });
  }

  /* Search filter */
  if (searchQuery) {
    var q = searchQuery.toLowerCase();
    filtered = filtered.filter(function(it) {
      return it.text.toLowerCase().indexOf(q) !== -1 ||
             it.source.toLowerCase().indexOf(q) !== -1 ||
             (it.platform && it.platform.toLowerCase().indexOf(q) !== -1);
    });
  }

  return filtered;
}

/* ================================================================
   RENDERING
   ================================================================ */
function renderAll() {
  renderList();
}

function renderList() {
  var filtered = getFiltered();
  var total = filtered.length;
  var totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;

  var start = (currentPage - 1) * PAGE_SIZE;
  var pageItems = filtered.slice(start, start + PAGE_SIZE);

  var container = document.getElementById('item-list');

  if (total === 0) {
    var hint = searchQuery
      ? '换个关键词试试，或清空搜索查看全部线报'
      : (activeSource !== 'all' ? '该来源暂无线报，试试其他来源' : '暂无线报数据');
    container.innerHTML =
      '<div class="list-empty">' +
        '<span class="empty-icon">📭</span>' +
        '<div>暂无相关线报</div>' +
        '<div class="empty-hint">' + esc(hint) + '</div>' +
        (searchQuery || activeSource !== 'all'
          ? '<button class="empty-action" onclick="resetFilters()">查看全部线报</button>'
          : '') +
      '</div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  var html = '';
  pageItems.forEach(function(it) {
    var char = getSourceChar(it.source);
    var color = getSourceColor(it.source);
    var title = highlightPrice(esc(cleanTitle(it.text)));
    var time = formatTime(it.time);
    var platformHtml = it.platform ? '<span class="platform-tag">' + esc(it.platform) + '</span>' : '';

    html += '<article class="item" role="listitem">' +
      '<a href="' + escAttr(it.url) + '" target="_blank" rel="noopener noreferrer" aria-label="' + escAttr(cleanTitle(it.text)) + ' - 来源: ' + escAttr(it.source) + '">' +
        '<span class="src-badge" style="background:' + color + '" aria-hidden="true">' + esc(char) + '</span>' +
        '<div class="item-body">' +
          '<div class="item-title">' + title + '</div>' +
          '<div class="item-meta">' +
            '<span>' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' +
              '<time>' + esc(time) + '</time>' +
            '</span>' +
            platformHtml +
          '</div>' +
        '</div>' +
      '</a>' +
    '</article>';
  });

  container.innerHTML = html;
  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  var container = document.getElementById('pagination');
  if (totalPages <= 1) {
    container.innerHTML = '';
    return;
  }

  var prevClass = currentPage <= 1 ? 'page-btn disabled' : 'page-btn';
  var nextClass = currentPage >= totalPages ? 'page-btn disabled' : 'page-btn';

  var selectHtml = '<select id="page-select" onchange="goToPage(this.value)">';
  for (var i = 1; i <= totalPages; i++) {
    selectHtml += '<option value="' + i + '"' + (i === currentPage ? ' selected' : '') + '>第 ' + i + ' 页</option>';
  }
  selectHtml += '</select>';

  container.innerHTML =
    '<button class="' + prevClass + '" onclick="goToPage(' + (currentPage - 1) + ')">上一页</button>' +
    selectHtml +
    '<button class="' + nextClass + '" onclick="goToPage(' + (currentPage + 1) + ')">下一页</button>';
}

function goToPage(p) {
  p = parseInt(p);
  var filtered = getFiltered();
  var totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  renderList();
  updateStatus();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

/* ================================================================
   VIEW SWITCHING
   ================================================================ */
function switchView(view) {
  currentView = view;

  /* Update menu */
  document.querySelectorAll('#menu button').forEach(function(el) {
    el.classList.toggle('active', el.getAttribute('data-view') === view);
  });

  /* Show/hide sections */
  document.getElementById('list-view').style.display = view === 'list' ? '' : 'none';
}

/* ================================================================
   SEARCH
   ================================================================ */
function handleSearch(e) {
  e.preventDefault();
  searchQuery = document.getElementById('search-input').value.trim();
  currentPage = 1;
  renderList();
  updateStatus();
}

function resetFilters() {
  searchQuery = '';
  activeSource = 'all';
  currentPage = 1;
  document.getElementById('search-input').value = '';
  buildSidebar();
  buildMobileDropdown();
  renderAll();
  updateStatus();
  document.getElementById('cat-toggle-text').textContent = '全部线报';
}

/* ================================================================
   STATUS
   ================================================================ */
function updateStatus() {
  var filtered = getFiltered();
  var el = document.getElementById('status-text');
  el.removeAttribute('aria-busy');
  var parts = [];

  if (activeSource !== 'all') {
    parts.push('来源: <span class="highlight">' + esc(activeSource) + '</span>');
  }
  if (searchQuery) {
    parts.push('搜索: <span class="highlight">"' + esc(searchQuery) + '"</span>');
  }
  parts.push('共 ' + filtered.length + ' 条线报');

  el.innerHTML = parts.join(' · ');
}

/* ================================================================
   MOBILE CATEGORY DROPDOWN
   ================================================================ */
var catDropdownOpen = false;
function toggleCatDropdown() {
  catDropdownOpen = !catDropdownOpen;
  var dd = document.getElementById('cat-dropdown');
  var bar = document.getElementById('cat-toggle-bar');
  dd.classList.toggle('open', catDropdownOpen);
  bar.classList.toggle('open', catDropdownOpen);
  bar.setAttribute('aria-expanded', catDropdownOpen);
}
function closeCatDropdown() {
  catDropdownOpen = false;
  document.getElementById('cat-dropdown').classList.remove('open');
  document.getElementById('cat-toggle-bar').classList.remove('open');
  document.getElementById('cat-toggle-bar').setAttribute('aria-expanded', 'false');
}

/* ================================================================
   BACK TO TOP
   ================================================================ */
window.addEventListener('scroll', function() {
  document.getElementById('back-top').classList.toggle('show', window.scrollY > 300);
});

/* ================================================================
   UTILITIES
   ================================================================ */
function esc(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function escAttr(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

/* ================================================================
   KEYBOARD SHORTCUTS
   ================================================================ */
document.addEventListener('keydown', function(e) {
  var tag = (e.target.tagName || '').toLowerCase();
  var isInput = tag === 'input' || tag === 'textarea' || tag === 'select' || e.target.isContentEditable;

  /* Esc: close dropdown, blur search, clear search */
  if (e.key === 'Escape') {
    if (catDropdownOpen) closeCatDropdown();
    if (isInput) { e.target.blur(); }
    if (searchQuery) {
      document.getElementById('search-input').value = '';
      searchQuery = '';
      currentPage = 1;
      renderAll();
      updateStatus();
    }
    return;
  }

  /* / : focus search (when not already in an input) */
  if (e.key === '/' && !isInput && !e.ctrlKey && !e.metaKey && !e.altKey) {
    e.preventDefault();
    document.getElementById('search-input').focus();
    return;
  }
});

/* Show keyboard hints on desktop after load */
if (window.innerWidth > 960) {
  setTimeout(function() {
    var hint = document.getElementById('kbd-hint');
    hint.classList.add('show');
    setTimeout(function() { hint.classList.remove('show'); }, 5000);
  }, 2000);
}

/* ================================================================
   REDUCED MOTION
   ================================================================ */
if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
  document.documentElement.style.scrollBehavior = 'auto';
  var style = document.createElement('style');
  style.textContent = '*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}';
  document.head.appendChild(style);
}

/* ================================================================
   PWA INSTALL PROMPT
   ================================================================ */
var deferredPrompt = null;
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredPrompt = e;
  /* Show install button after 10 seconds */
  setTimeout(showInstallBanner, 10000);
});
function showInstallBanner() {
  if (!deferredPrompt) return;
  if (document.getElementById('install-banner')) return;
  var banner = document.createElement('div');
  banner.id = 'install-banner';
  banner.setAttribute('role', 'dialog');
  banner.setAttribute('aria-label', '安装线报聚合到主屏幕');
  banner.innerHTML =
    '<span>安装到主屏幕，获取实时线报</span>' +
    '<button onclick="installApp()" aria-label="确认安装">安装</button>' +
    '<button onclick="dismissInstall()" aria-label="关闭安装提示">&times;</button>';
  document.body.appendChild(banner);
}
function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(function(r) { deferredPrompt = null; });
  dismissInstall();
}
function dismissInstall() {
  var b = document.getElementById('install-banner');
  if (b) b.remove();
  deferredPrompt = null;
}

/* ================================================================
   TOUCH GESTURES (swipe to switch views)
   ================================================================ */
/* ================================================================
   SERVICE WORKER
   ================================================================ */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function(){});
}

/* ================================================================
   INIT
   ================================================================ */
loadData();
</script>
