<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>线报聚合 - RSS 阅读器</title>
<meta name="description" content="全网羊毛线报实时聚合，RSS 在线阅读">
<meta name="theme-color" content="#1a73e8">
<link rel="alternate" type="application/atom+xml" title="RSS Feed" href="feed.xml">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f5f5;--card:#fff;--text:#333;--text2:#888;--accent:#1a73e8;--border:#e0e0e0;--tag:#e8f0fe;--tag-text:#1a73e8;--new:#e8f5e9;--hover:#fafafa}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--card:#2a2a2a;--text:#e0e0e0;--text2:#999;--accent:#8ab4f8;--border:#404040;--tag:#1a3a5c;--tag-text:#8ab4f8;--new:#1a3a1a;--hover:#333}}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
header h1{font-size:18px;white-space:nowrap}
header h1 a{color:var(--text);text-decoration:none}
header h1 span{color:var(--accent);font-size:14px;font-weight:normal;margin-left:6px}
.search-box{flex:1;min-width:160px;max-width:320px;position:relative}
.search-box input{width:100%;padding:6px 10px 6px 30px;border:1px solid var(--border);border-radius:20px;font-size:14px;background:var(--bg);color:var(--text);outline:none}
.search-box input:focus{border-color:var(--accent)}
.search-box::before{content:"🔍";position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:12px}
.source-filter{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.source-filter button{padding:3px 10px;border:1px solid var(--border);border-radius:14px;font-size:12px;background:var(--card);color:var(--text);cursor:pointer;white-space:nowrap}
.source-filter button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.source-filter button:hover{opacity:.85}
.stats{font-size:12px;color:var(--text2);white-space:nowrap}
main{max-width:800px;margin:0 auto;padding:8px}
.entry{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:8px;transition:background .15s}
.entry:hover{background:var(--hover)}
.entry.is-new{border-left:3px solid var(--accent)}
.entry-header{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.entry-source{font-size:11px;padding:1px 6px;border-radius:8px;background:var(--tag);color:var(--tag-text);white-space:nowrap}
.entry-time{font-size:11px;color:var(--text2)}
.entry-title{font-size:15px;font-weight:500}
.entry-title a{color:var(--text);text-decoration:none}
.entry-title a:hover{color:var(--accent)}
.entry-cat{font-size:11px;padding:1px 6px;border-radius:8px;background:var(--new);color:#4caf50}
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty p{margin-top:8px;font-size:14px}
.load-more{text-align:center;padding:16px}
.load-more button{padding:8px 24px;border:1px solid var(--border);border-radius:20px;background:var(--card);color:var(--text);cursor:pointer;font-size:14px}
.load-more button:hover{border-color:var(--accent);color:var(--accent)}
footer{text-align:center;padding:20px;font-size:12px;color:var(--text2)}
footer a{color:var(--accent);text-decoration:none}
.loading{text-align:center;padding:40px;color:var(--text2)}
@media(max-width:600px){
  header{padding:8px 12px;gap:8px}
  header h1{font-size:16px}
  .search-box{max-width:none;min-width:100px}
  main{padding:4px}
  .entry{padding:10px 12px;border-radius:6px}
  .entry-title{font-size:14px}
}
</style>
</head>
<body>
<header>
  <h1><a href="./">📡 线报聚合</a><span id="count"></span></h1>
  <div class="search-box"><input type="text" id="search" placeholder="搜索线报..."></div>
  <div class="source-filter" id="sources"></div>
</header>
<main id="feed"><div class="loading">加载中...</div></main>
<div class="load-more" id="more" style="display:none"><button onclick="showMore()">加载更多</button></div>
<footer>线报聚合 · RSS 在线阅读 · <a href="feed.xml" target="_blank">RSS 订阅</a> · <a href="status.html">监控状态</a></footer>

<script>
var PAGE_SIZE = 30;
var allEntries = [];
var filtered = [];
var activeSource = 'all';
var searchQuery = '';
var shown = 0;

function parseFeed(xml) {
  var parser = new DOMParser();
  var doc = parser.parseFromString(xml, 'text/xml');
  var ns = 'http://www.w3.org/2005/Atom';
  var entries = [];
  var els = doc.getElementsByTagNameNS(ns, 'entry');
  for (var i = 0; i < els.length; i++) {
    var e = els[i];
    var title = e.getElementsByTagNameNS(ns, 'title');
    var link = e.getElementsByTagNameNS(ns, 'link');
    var updated = e.getElementsByTagNameNS(ns, 'updated');
    var content = e.getElementsByTagNameNS(ns, 'content');
    var category = e.getElementsByTagNameNS(ns, 'category');

    var titleText = title.length ? title[0].textContent : '';
    var href = link.length ? link[0].getAttribute('href') : '';
    var timeText = updated.length ? updated[0].textContent : '';
    var contentText = content.length ? content[0].textContent : '';
    var catText = category.length ? category[0].getAttribute('term') : '';

    // Extract source from content like "来源: XXX | 链接: ..."
    var source = '';
    if (contentText) {
      var parts = contentText.split('|');
      for (var j = 0; j < parts.length; j++) {
        var p = parts[j].trim();
        if (p.indexOf('来源:') === 0 || p.indexOf('来源：') === 0) {
          source = p.replace(/^来源[:：]\s*/, '');
          break;
        }
      }
    }

    // Format time for display
    var displayTime = '';
    var diffMin = 0;
    if (timeText) {
      var d = new Date(timeText);
      if (!isNaN(d.getTime())) {
        diffMin = Math.floor((Date.now() - d.getTime()) / 60000);
        if (diffMin < 60) {
          displayTime = diffMin <= 1 ? '刚刚' : diffMin + ' 分钟前';
        } else if (diffMin < 1440) {
          displayTime = Math.floor(diffMin / 60) + ' 小时前';
        } else {
          displayTime = (d.getMonth() + 1) + '/' + d.getDate() + ' ' +
            String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
        }
      }
    }

    entries.push({
      title: titleText,
      href: href,
      time: timeText,
      displayTime: displayTime,
      source: source,
      category: catText,
      isNew: diffMin > 0 && diffMin < 60
    });
  }
  return entries;
}

function render() {
  var feed = document.getElementById('feed');
  if (filtered.length === 0) {
    feed.innerHTML = '<div class="empty"><p>没有匹配的线报</p></div>';
    document.getElementById('more').style.display = 'none';
    return;
  }

  var end = Math.min(shown + PAGE_SIZE, filtered.length);
  var html = '';
  for (var i = shown; i < end; i++) {
    var e = filtered[i];
    var cls = 'entry' + (e.isNew ? ' is-new' : '');
    html += '<div class="' + cls + '">';
    html += '<div class="entry-header">';
    if (e.source) html += '<span class="entry-source">' + esc(e.source) + '</span>';
    if (e.category) html += '<span class="entry-cat">' + esc(e.category) + '</span>';
    html += '<span class="entry-time">' + esc(e.displayTime) + '</span>';
    html += '</div>';
    html += '<div class="entry-title"><a href="' + esc(e.href) + '" target="_blank" rel="noopener">' + esc(e.title) + '</a></div>';
    html += '</div>';
  }
  if (shown === 0) {
    feed.innerHTML = html;
  } else {
    feed.insertAdjacentHTML('beforeend', html);
  }
  shown = end;
  document.getElementById('more').style.display = shown < filtered.length ? '' : 'none';
  document.getElementById('count').textContent = filtered.length + ' 条';
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function applyFilter() {
  filtered = allEntries.filter(function(e) {
    if (activeSource !== 'all' && e.source !== activeSource) return false;
    if (searchQuery && e.title.indexOf(searchQuery) === -1 && e.source.indexOf(searchQuery) === -1) return false;
    return true;
  });
  shown = 0;
  render();
}

function showMore() {
  render();
}

function buildSourceFilter() {
  var counts = {};
  allEntries.forEach(function(e) {
    if (e.source) counts[e.source] = (counts[e.source] || 0) + 1;
  });
  var sorted = Object.keys(counts).sort(function(a, b) { return counts[b] - counts[a]; });
  var html = '<button class="' + (activeSource === 'all' ? 'active' : '') + '" onclick="setSource(\'all\')">全部</button>';
  sorted.forEach(function(s) {
    html += '<button class="' + (activeSource === s ? 'active' : '') + '" onclick="setSource(\'' + esc(s) + '\')">' + esc(s) + ' ' + counts[s] + '</button>';
  });
  document.getElementById('sources').innerHTML = html;
}

function setSource(s) {
  activeSource = s;
  buildSourceFilter();
  applyFilter();
}

// Search
var searchTimer;
document.getElementById('search').addEventListener('input', function() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function() {
    searchQuery = document.getElementById('search').value.trim();
    applyFilter();
  }, 200);
});

// Load feed
fetch('feed.xml?t=' + Date.now())
  .then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.text();
  })
  .then(function(xml) {
    allEntries = parseFeed(xml);
    buildSourceFilter();
    applyFilter();
  })
  .catch(function(err) {
    document.getElementById('feed').innerHTML =
      '<div class="empty"><p>加载失败: ' + esc(err.message) + '</p></div>';
  });
</script>
</body>
</html>
