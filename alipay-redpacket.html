<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#e53935">
<title>支付宝扫码领红包</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#e53935;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;overflow:hidden}
.wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
.title{color:#fff;font-size:22px;font-weight:700;margin-bottom:8px;text-shadow:0 2px 4px rgba(0,0,0,.15)}
.sub{color:#ffcdd2;font-size:14px;margin-bottom:24px}
.qr-box{background:#fff;padding:12px;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.2);max-width:320px;width:100%}
.qr-box img{width:100%;height:auto;border-radius:8px;display:block}
.back{position:absolute;top:16px;left:16px;color:#ffcdd2;text-decoration:none;font-size:14px;display:flex;align-items:center;gap:4px;opacity:.8;transition:opacity .2s}
.back:hover{opacity:1;color:#fff}
.back svg{width:18px;height:18px}
</style>
</head>
<body>
<a href="./" class="back">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
  返回首页
</a>
<div class="wrap">
  <div class="title">支付宝扫码领红包</div>
  <div class="sub">每天可领一次，消费直接抵扣</div>
  <div class="qr-box">
    <img src="alipay-redpacket.jpg" alt="支付宝红包二维码">
  </div>
</div>
</body>
</html>
